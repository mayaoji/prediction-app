<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 颜色与字体定义 */
        :root {
            --primary: #248bcf;
            --primary-light: #31a6f5;
            --bg: #0e1621;
            --card-bg: #17212b;
            --text-main: #ffffff;
            --text-dim: #81b3d2;
            /* 设置圆润字体优先 */
            --font-round: "Quicksand", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Rounded Mplus 1c", sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: var(--font-round);
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* 顶部导航 - 字体加圆 */
        .top-nav {
            width: 100%; max-width: 500px; padding: 18px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(14, 22, 33, 0.9); backdrop-filter: blur(10px); z-index: 100;
        }
        .brand { 
            font-size: 20px; 
            font-weight: 700; 
            letter-spacing: 0.5px; 
            display: flex; align-items: center; gap: 8px;
            border-radius: 50px;
        }
        .brand span { color: var(--primary); }

        /* 资产卡片 - 颜色高度统一 */
        .wallet-card {
            width: calc(100% - 32px); max-width: 468px;
            background: linear-gradient(145deg, #1d2b3a 0%, var(--primary) 100%);
            margin: 10px 16px 24px; padding: 26px; border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }
        .wallet-label { font-size: 13px; opacity: 0.8; margin-bottom: 6px; letter-spacing: 1px; }
        .wallet-balance { font-size: 34px; font-weight: 800; display: flex; align-items: baseline; }
        .wallet-balance small { font-size: 18px; margin-left: 8px; font-weight: 400; }

        /* 市场列表 */
        .market-section { width: 100%; max-width: 500px; padding: 0 16px 140px; }
        .section-header { 
            font-size: 14px; font-weight: 600; color: var(--text-dim); 
            margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center;
        }

        .market-card {
            background: var(--card-bg); border-radius: 22px; padding: 22px; margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s;
        }
        .market-card:active { transform: scale(0.97); }
        
        .market-topic { 
            font-size: 18px; font-weight: 700; margin-bottom: 15px; line-height: 1.5; 
            border-radius: 12px;
        }
        
        .market-footer { 
            display: flex; justify-content: space-between; align-items: center; 
            padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); 
        }
        .pool-info { font-size: 14px; color: var(--text-dim); }
        .pool-info b { color: var(--primary-light); font-size: 16px; }
        
        /* 按钮统一化 */
        .bet-btn { 
            background: rgba(36, 139, 207, 0.12); color: var(--primary-light); 
            border: none; padding: 8px 18px; border-radius: 15px; 
            font-size: 14px; font-weight: 700; transition: 0.2s;
        }
        .bet-btn:active { background: var(--primary); color: white; }

        /* 底部操作条 */
        .action-bar {
            position: fixed; bottom: 25px; width: calc(100% - 32px); max-width: 468px;
            z-index: 1000;
        }
        .btn-main {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 20px; border-radius: 22px; font-size: 17px; font-weight: 700;
            box-shadow: 0 10px 25px rgba(36, 139, 207, 0.4); 
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 5px 15px rgba(36, 139, 207, 0.3); }

        .dot { height: 8px; width: 8px; background-color: #44bb44; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px #44bb44; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="brand">🚀 中国<span>预测市场</span></div>
        <div id="user-info" style="font-size: 13px; color: var(--text-dim);">加载中...</div>
    </div>

    <div class="wallet-card">
        <div class="wallet-label">我的账户 (TON)</div>
        <div class="wallet-balance" id="balance">0.00 <small>TON</small></div>
    </div>

    <div class="market-section">
        <div class="section-header">
            <span>🔥 正在进行的预测</span>
            <span><span class="dot"></span> 实时同步</span>
        </div>
        <div id="market-list">
            </div>
    </div>

    <div class="action-bar">
        <button class="btn-main" onclick="openCreateModal()">
            <span>📝 发起新预测 (0.1 TON)</span>
        </button>
    </div>

    <script>
        const SB_URL = "https://kfalyawduveuuttniiun.supabase.co";
        const SB_KEY = "sb_publishable_6mBG3xWhYAHCOEmNIG4BEA_wh5O2Ayx";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 用户显示
        const user = tg.initDataUnsafe.user;
        document.getElementById('user-info').innerText = user ? user.first_name : "开发模式";

        async function loadMarkets() {
            try {
                const { data, error } = await supabaseClient
                    .from('markets')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const listDiv = document.getElementById('market-list');
                listDiv.innerHTML = data.map(item => `
                    <div class="market-card">
                        <div class="market-topic">📊 ${item.topic || '未命名话题'}</div>
                        <div class="market-footer">
                            <div class="pool-info">当前奖池 <b>${item.pool || 0}</b> TON</div>
                            <button class="bet-btn" onclick="placeBet('${item.id}')">立即参与</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("加载数据失败:", err);
            }
        }

        async function createNewMarket() {
            const topic = prompt("请输入您想预测的话题：");
            if (!topic) return;

            try {
                const { error } = await supabaseClient
                    .from('markets')
                    .insert([{ topic: topic, pool: 0.1 }]);

                if (error) throw error;
                tg.HapticFeedback.notificationOccurred('success');
                loadMarkets();
            } catch (err) {
                alert("发起失败: " + err.message);
            }
        }

        function openCreateModal() {
            tg.showConfirm("发起预测将支付 0.1 TON，是否继续？", (ok) => {
                if (ok) createNewMarket();
            });
        }

        function placeBet(id) {
            tg.HapticFeedback.impactOccurred('medium');
            alert("正在连接智能合约...");
        }

        window.onload = loadMarkets;
    </script>
</body>
</html>
