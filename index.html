<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg-pure: #000000;
            --card-dark: #121212;
            --btn-light-gray: #e0e0e0;
            --gold: #d4af37;
            --text-white: #ffffff;
            --text-gray: #888888;
        }

        body { 
            background: var(--bg-pure); color: var(--text-white); 
            font-family: -apple-system, "PingFang SC", sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
        }

        .app-container { width: 100%; max-width: 500px; padding: 20px; padding-bottom: 120px; }

        /* 标题部分：增加英文后缀 */
        .header { text-align: center; margin: 40px 0; }
        .brand { font-size: 22px; font-weight: 800; color: var(--gold); letter-spacing: 2px; margin-bottom: 4px; }
        .brand-en { font-size: 10px; color: var(--gold); opacity: 0.6; letter-spacing: 1px; font-weight: 500; text-transform: uppercase; }

        /* 钱包卡片 */
        .wallet-card {
            background: var(--card-dark); border-radius: 24px; padding: 30px 20px;
            margin-bottom: 30px; text-align: center;
            border: 1px solid #1f1f1f;
        }
        .wallet-title { font-size: 13px; color: var(--text-gray); margin-bottom: 18px; letter-spacing: 0.5px; }
        #ton-connect-btn { display: flex; justify-content: center; }

        .section-header { font-size: 12px; font-weight: 600; color: var(--gold); margin-bottom: 15px; opacity: 0.7; padding-left: 5px; }

        /* 预测卡片 */
        .market-item {
            background: var(--card-dark); border-radius: 22px; padding: 24px; margin-bottom: 15px;
            border: 1px solid #1f1f1f;
        }
        .market-topic { font-size: 18px; font-weight: 700; margin-bottom: 20px; line-height: 1.4; color: #fdfdfd; }
        
        /* 比例进度条 */
        .vote-stats { display: flex; gap: 10px; margin-bottom: 22px; }
        .vote-bar { 
            flex: 1; background: #0a0a0a; height: 46px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 800; position: relative; overflow: hidden;
            border: 1px solid #1a1a1a;
        }
        .vote-fill { position: absolute; left: 0; top: 0; height: 100%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0.2; }
        .yes-fill { background: #00ff88; }
        .no-fill { background: #ff4d4d; }
        .vote-label { z-index: 2; }
        .vote-label.yes { color: #00ff88; }
        .vote-label.no { color: #ff4d4d; }

        /* 按钮：浅灰色 */
        .btn-join {
            width: 100%; background: var(--btn-light-gray); color: #000; border: none;
            padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 800; cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-join:active { transform: scale(0.98); }

        /* 底部固定发起按钮 */
        .fixed-footer {
            position: fixed; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000;
        }
        .btn-create {
            width: 90%; max-width: 450px; background: var(--btn-light-gray); color: #000; border: none;
            padding: 18px; border-radius: 22px; font-size: 16px; font-weight: 800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="brand">中国预测市场</div>
            <div class="brand-en">China Prediction Market</div>
        </div>

        <div class="wallet-card">
            <div class="wallet-title">CONNECT WALLET TO PARTICIPATE</div>
            <div id="ton-connect-btn"></div>
        </div>

        <div class="section-header">ACTIVE PREDICTIONS</div>
        <div id="market-list"></div>
    </div>

    <div class="fixed-footer">
        <button id="main-create-btn" class="btn-create">发起新预测 (0.1 TON)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://mayaoji.github.io/prediction-app/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        const SB_URL = "https://kfalyawduveuuttniiun.supabase.co";
        const SB_KEY = "sb_publishable_6mBG3xWhYAHCOEmNIG4BEA_wh5O2Ayx";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function loadMarkets() {
            const { data } = await supabaseClient.from('markets').select('*').order('created_at', { ascending: false });
            const listDiv = document.getElementById('market-list');
            
            if (data && data.length > 0) {
                listDiv.innerHTML = data.map(item => {
                    const yesV = item.yes_votes || 0;
                    const noV = item.no_votes || 0;
                    const total = yesV + noV;
                    const yesP = total === 0 ? 50 : Math.round((yesV / total) * 100);
                    const noP = 100 - yesP;
                    
                    return `
                    <div class="market-item">
                        <div class="market-topic">${item.topic}</div>
                        <div class="vote-stats">
                            <div class="vote-bar">
                                <div class="vote-fill yes-fill" style="width: ${yesP}%"></div>
                                <span class="vote-label yes">Yes ${yesP}%</span>
                            </div>
                            <div class="vote-bar">
                                <div class="vote-fill no-fill" style="width: ${noP}%"></div>
                                <span class="vote-label no">No ${noP}%</span>
                            </div>
                        </div>
                        <button class="btn-join" onclick="handleBet('${item.id}')">立即参与</button>
                    </div>
                    `;
                }).join('');
            }
        }

        document.getElementById('main-create-btn').addEventListener('click', () => {
            tg.HapticFeedback.impactOccurred('medium');
            if (!tonConnectUI.connected) {
                tg.showAlert("Please connect your wallet first.");
            } else {
                tg.showAlert("功能对接中...");
            }
        });

        async function handleBet(marketId) {
            tg.HapticFeedback.selectionChanged();
            if (!tonConnectUI.connected) {
                tonConnectUI.openModal();
            } else {
                tg.showAlert("正在唤起 TON 钱包...");
            }
        }

        window.onload = () => {
            tg.ready();
            tg.expand();
            loadMarkets();
        };
    </script>
</body>
</html>
