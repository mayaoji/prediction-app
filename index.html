<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国预测市场</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background: linear-gradient(to bottom, #0088cc, #005f99);
            color: white;
            text-align: center;
        }
        h1 { font-size: 26px; margin: 15px 0; }
        button {
            padding: 14px 24px;
            margin: 8px 4px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            min-width: 140px;
        }
        .yes-btn { background: #4CAF50; color: white; }
        .no-btn { background: #f44336; color: white; }
        .market {
            background: rgba(255,255,255,0.25);
            margin: 15px 0;
            padding: 18px;
            border-radius: 12px;
            text-align: left;
        }
        .header { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 中国预测市场</h1>
        <p>欢迎，<span id="user">朋友</span>！</p >
    </div>

    <button onclick="createMarket()">📝 发布新预测</button>
    <button onclick="viewMarkets()">📋 查看所有预测</button>

    <div id="result" style="margin-top:30px;"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user || {};
        document.getElementById('user').textContent = user.first_name || "朋友";

        let markets = JSON.parse(localStorage.getItem('markets') || '[]');

        function createMarket() {
            const title = prompt("请输入预测标题：\n例如：Sora 本月会向中国用户开放吗？");
            if (!title || title.trim() === "") {
                tg.showAlert("标题不能为空！");
                return;
            }

            markets.push({
                id: Date.now(),
                title: title.trim(),
                creator: user.first_name || "匿名",
                time: new Date().toLocaleString('zh-CN'),
                yes: 0,
                no: 0
            });

            localStorage.setItem('markets', JSON.stringify(markets));
            tg.showAlert("✅ 发布成功！");
            viewMarkets();
        }

        function viewMarkets() {
            let html = "<h2>当前活跃预测：</h2>";
            if (markets.length === 0) {
                html += "<p>还没有预测，快去发布第一个吧！</p >";
            } else {
                markets.forEach(function(m) {
                    const total = (m.yes || 0) + (m.no || 0) || 1;
                    const yesP = Math.round(((m.yes || 0) / total) * 100);
                    const noP = Math.round(((m.no || 0) / total) * 100);

                    html += '<div class="market">';
                    html += '<b>' + m.title + '</b><br>';
                    html += '<small>发布者：' + m.creator + ' | ' + m.time + '</small><br><br>';
                    html += '<button class="yes-btn" onclick="vote(' + m.id + ', \'yes\')">Yes (' + yesP + '%)</button>';
                    html += '<span style="margin-left:15px">' + (m.yes || 0) + ' 人</span><br><br>';
                    html += '<button class="no-btn" onclick="vote(' + m.id + ', \'no\')">No (' + noP + '%)</button>';
                    html += '<span style="margin-left:15px">' + (m.no || 0) + ' 人</span>';
                    html += '</div>';
                });
            }
            document.getElementById('result').innerHTML = html;
        }

        function vote(id, option) {
            for (var i = 0; i < markets.length; i++) {
                if (markets[i].id === id) {
                    if (option === 'yes') markets[i].yes = (markets[i].yes || 0) + 1;
                    else markets[i].no = (markets[i].no || 0) + 1;
                    break;
                }
            }
            localStorage.setItem('markets', JSON.stringify(markets));
            tg.showAlert('你选择了 ' + option.toUpperCase() + '！');
            viewMarkets();
        }

        window.onload = viewMarkets;
    </script>
</body>
</html>
