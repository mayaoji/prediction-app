<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国预测市场</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0088cc, #005f99);
            color: white;
            text-align: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 32px;
            margin: 20px 0 10px;
        }
        p { 
            font-size: 18px; 
            margin-bottom: 25px; 
        }
        button {
            padding: 18px 24px;
            margin: 12px 5px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            width: 90%;
            max-width: 340px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .yes-btn { background: #4CAF50; color: white; }
        .no-btn { background: #f44336; color: white; }
        .market {
            background: rgba(255,255,255,0.2);
            margin: 18px 0;
            padding: 22px;
            border-radius: 20px;
            text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .connect-btn { background: #1a73e8; color: white; }
    </style>
</head>
<body>
    <h1>🚀 中国预测市场</h1>
    <p>欢迎，<span id="user">朋友</span>！</p>

    <button onclick="connectWallet()" class="connect-btn">🔗 连接 TON 钱包</button>
    <button onclick="createMarket()">📝 发布新预测</button>
    <button onclick="viewMarkets()">📋 查看所有预测</button>

    <div id="result" style="margin-top:30px;"></div>

    <script>
        let markets = JSON.parse(localStorage.getItem("markets") || "[]");
        let walletConnected = false;

        function connectWallet() {
            walletConnected = true;
            alert("✅ TON 钱包已连接！\n\n现在可以正常买入份额了。\n（真实支付开发中）");
        }

        function createMarket() {
            const title = prompt("请输入预测标题：\n例如：Sora 本月会向中国用户开放吗？");
            if (!title || title.trim() === "") {
                alert("标题不能为空！");
                return;
            }
            markets.push({
                id: Date.now(),
                title: title.trim(),
                creator: "用户",
                time: new Date().toLocaleString("zh-CN"),
                yes: 0,
                no: 0
            });
            localStorage.setItem("markets", JSON.stringify(markets));
            alert("✅ 发布成功！");
            viewMarkets();
        }

        function viewMarkets() {
            let html = "<h2>当前活跃预测：</h2>";
            if (markets.length === 0) {
                html += "<p>还没有预测，快去发布第一个吧！</p>";
            } else {
                for (var i = 0; i < markets.length; i++) {
                    var m = markets[i];
                    var total = (m.yes || 0) + (m.no || 0) || 1;
                    var yesP = Math.round(((m.yes || 0) / total) * 100);
                    var noP = Math.round(((m.no || 0) / total) * 100);

                    html += '<div class="market">';
                    html += "<b>" + m.title + "</b><br>";
                    html += "<small>发布者：" + m.creator + " | " + m.time + "</small><br><br>";
                    html += '<button class="yes-btn" onclick="buyYes(' + m.id + ')">Yes (' + yesP + '%)</button>';
                    html += '<span style="margin-left:15px">' + (m.yes || 0) + ' 份额</span><br><br>';
                    html += '<button class="no-btn" onclick="buyNo(' + m.id + ')">No (' + noP + '%)</button>';
                    html += '<span style="margin-left:15px">' + (m.no || 0) + ' 份额</span>';
                    html += "</div>";
                }
            }
            document.getElementById("result").innerHTML = html;
        }

        function buyYes(id) {
            if (!walletConnected) {
                alert("请先点击上方“连接 TON 钱包”！");
                return;
            }
            const amount = prompt("请输入买入 Yes 的份额数量：", "10");
            if (!amount || isNaN(amount) || amount <= 0) return alert("数量无效！");
            
            for (var i = 0; i < markets.length; i++) {
                if (markets[i].id === id) {
                    markets[i].yes = (markets[i].yes || 0) + parseInt(amount);
                    break;
                }
            }
            localStorage.setItem("markets", JSON.stringify(markets));
            alert("✅ 已买入 " + amount + " Yes 份额！");
            viewMarkets();
        }

        function buyNo(id) {
            if (!walletConnected) {
                alert("请先点击上方“连接 TON 钱包”！");
                return;
            }
            const amount = prompt("请输入买入 No 的份额数量：", "10");
            if (!amount || isNaN(amount) || amount <= 0) return alert("数量无效！");
            
            for (var i = 0; i < markets.length; i++) {
                if (markets[i].id === id) {
                    markets[i].no = (markets[i].no || 0) + parseInt(amount);
                    break;
                }
            }
            localStorage.setItem("markets", JSON.stringify(markets));
            alert("✅ 已买入 " + amount + " No 份额！");
            viewMarkets();
        }

        // 初始加载
        window.onload = viewMarkets;
    </script>
</body>
</html>
