<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国预测市场 - 预测未来，一起下注</title>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(to bottom, #0a2540, #1e3a8a);
            color: white;
            text-align: center;
            line-height: 1.6;
        }
        header {
            padding: 40px 20px;
        }
        h1 {
            font-size: 48px;
            margin: 0 0 10px 0;
        }
        .subtitle {
            font-size: 24px;
            opacity: 0.9;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        button {
            padding: 16px 32px;
            margin: 15px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-secondary {
            background: white;
            color: #1e40af;
        }
        .market-card {
            background: rgba(255,255,255,0.1);
            margin: 20px auto;
            padding: 25px;
            border-radius: 16px;
            max-width: 800px;
            text-align: left;
        }
        footer {
            margin-top: 80px;
            padding: 30px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <header>
        <h1>🚀 中国预测市场</h1>
        <p class="subtitle">预测未来，一起下注 · 真实事件 · 实时赔率</p >
    </header>

    <div class="container">
        <button class="btn-primary" onclick="alert('TON 钱包连接功能开发中...')">🔗 连接 TON 钱包</button>
        <button class="btn-secondary" onclick="createMarket()">📝 发布新预测</button>
        <button class="btn-secondary" onclick="viewMarkets()">📋 浏览所有预测</button>

        <div id="result" style="margin-top: 50px;"></div>
    </div>

    <footer>
        <p>中国预测市场 © 2026 | 数据仅供娱乐 · 理性参与</p >
        <p>当前链接：https://symphonious-granita-a4d445.netlify.app</p >
    </footer>

    <script>
        let markets = [];

        function createMarket() {
            const title = prompt("请输入预测标题（例如：2026年世界杯冠军是谁？）");
            if (!title) return;
            markets.push({
                id: Date.now(),
                title: title,
                yes: 0,
                no: 0
            });
            alert("✅ 预测发布成功！");
            viewMarkets();
        }

        function viewMarkets() {
            let html = "<h2 style='text-align:center;'>当前活跃预测</h2>";
            if (markets.length === 0) {
                html += "<p style='text-align:center;'>还没有预测，快来发布第一个吧！</p >";
            } else {
                markets.forEach(m => {
                    html += `
                        <div class="market-card">
                            <h3>${m.title}</h3>
                            <button onclick="buyYes(${m.id})" style="background:#22c55e;color:white;padding:12px 24px;border-radius:8px;">Yes</button> 
                            <span>${m.yes} 份额</span><br><br>
                            <button onclick="buyNo(${m.id})" style="background:#ef4444;color:white;padding:12px 24px;border-radius:8px;">No</button> 
                            <span>${m.no} 份额</span>
                        </div>`;
                });
            }
            document.getElementById("result").innerHTML = html;
        }

        function buyYes(id) {
            const amount = prompt("买入 Yes 份额数量：", "10");
            if (!amount || parseInt(amount) <= 0) return;
            markets.forEach(m => {
                if (m.id === id) m.yes += parseInt(amount);
            });
            alert("✅ 买入成功！");
            viewMarkets();
        }

        function buyNo(id) {
            const amount = prompt("买入 No 份额数量：", "10");
            if (!amount || parseInt(amount) <= 0) return;
            markets.forEach(m => {
                if (m.id === id) m.no += parseInt(amount);
            });
            alert("✅ 买入成功！");
            viewMarkets();
        }

        // 页面加载时显示
        window.onload = viewMarkets;
    </script>
</body>
</html>
