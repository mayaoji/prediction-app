<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase 测试</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#0e1621; color:white; padding:40px; font-family:sans-serif; text-align:center; }
        #result { background:#17212b; padding:30px; border-radius:12px; margin:20px auto; max-width:500px; }
    </style>
</head>
<body>
    <h1>Supabase 连接测试</h1>
    <div id="result">正在测试连接...</div>

    <script>
        const supabase = supabase.createClient(
            'https://kfalyawduveuuttniun.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYWx5YXdkdXZldXV0dG5paXVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODE2MjQsImV4cCI6MjA5MjQ1NzYyNH0.YdlWOljkvsimq628KSxw99bpvmyN8Bsdza15uFoEs_0'
        );

        async function test() {
            const result = document.getElementById('result');
            try {
                const { data, error } = await supabase.from('markets').select('*').limit(10);
                if (error) throw error;
                result.innerHTML = `✅ 连接成功！<br>找到 \( {data.length} 条记录<br><br> \){JSON.stringify(data, null, 2)}`;
            } catch (err) {
                result.innerHTML = `❌ 连接失败<br><br>${err.message || err}`;
            }
        }

        window.onload = test;
    </script>
</body>
</html>
