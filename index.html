<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>中国预测市场</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #248bcf;
            --bg: #0e1621;
            --card: #17212b;
        }
        body {
            background: var(--bg);
            color: white;
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            margin-bottom: 20px;
            text-align: center;
        }
        .status-badge {
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 20px;
            background: #23313d;
            color: #81b3d2;
            margin-top: 8px;
            display: inline-block;
        }
        .btn-group {
            width: 100%;
            max-width: 400px;
            display: grid;
            gap: 12px;
            margin: 20px 0;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        button.wallet-btn {
            background: #31a6f5;
        }
        .card {
            background: var(--card);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
        }
        #error-log {
            width: 100%;
            max-width: 400px;
            color: #ff5f5f;
            background: rgba(255,95,95,0.1);
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>🚀 中国预测市场</h2>
        <div id="connection-status" class="status-badge">正在初始化...</div>
    </div>

    <div class="btn-group">
        <button class="wallet-btn" id="wallet-button">🔗 连接 TON 钱包</button>
        <button onclick="publishPrediction()">📝 发起新预测 (0.1 TON)</button>
    </div>

    <div id="error-log"></div>
    <div class="data-container" id="list-container"></div>

    <script>
        // ==================== 配置 ====================
        const SB_URL = "https://kfalyawduveuuttniun.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYWx5YXdkdXZldXV0dG5paXVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODE2MjQsImV4cCI6MjA5MjQ1NzYyNH0.YdlWOljkvsimq628KSxw99bpvmyN8Bsdza15uFoEs_0";
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let tonConnectUI = null;

        // ==================== TON 钱包初始化 ====================
        async function initTonConnect() {
            try {
                tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                    manifestUrl: 'https://mayaoji.github.io/prediction-app/tonconnect-manifest.json',
                    buttonRootId: 'wallet-button'
                });

                tonConnectUI.onStatusChange((wallet) => {
                    const status = document.getElementById("connection-status");
                    if (wallet) {
                        status.innerHTML = "✅ TON 钱包已连接";
                        status.style.background = "#1e3a2f";
                    } else {
                        status.innerHTML = "未连接钱包";
                    }
                });
            } catch (e) {
                console.error(e);
            }
        }

        // ==================== 发布预测 ====================
        async function publishPrediction() {
            const topic = prompt("请输入预测话题：");
            if (!topic || !topic.trim()) return;

            if (!tonConnectUI || !tonConnectUI.connected) {
                alert("请先连接 TON 钱包！");
                return;
            }

            if (!confirm("本次发布需要支付 0.1 TON，确定继续吗？")) return;

            try {
                await tonConnectUI.sendTransaction({
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [{
                        address: "UQAb_7Mh7ZqfS_388mQ6E9vG_B6fKxH7O7X7_tZ_Az2y",
                        amount: "100000000"
                    }]
                });

                await supabaseClient.from('markets').insert([{ 
                    topic: topic.trim(), 
                    pool: 0.1 
                }]);

                alert("✅ 发布成功！");
                fetchData();
            } catch (e) {
                alert("支付取消或失败");
            }
        }

        // ==================== 加载数据 ====================
        async function fetchData() {
