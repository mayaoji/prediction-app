<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #26a17b; /* USDT 标志性的绿色 */
            --primary-light: #48c7a1;
            --bg: #0b1118;
            --card-bg: #161f28;
            --text-main: #ffffff;
            --text-dim: #7f8c9d;
            --font-round: "Quicksand", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); font-family: var(--font-round); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }

        /* 顶部导航 */
        .top-nav { width: 100%; max-width: 500px; padding: 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(11, 17, 24, 0.9); backdrop-filter: blur(10px); z-index: 100; }
        .brand { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--primary); }

        /* 资产卡片 - 改为 USDT 风格 */
        .wallet-card {
            width: calc(100% - 32px); max-width: 468px;
            background: linear-gradient(145deg, #162421 0%, var(--primary) 100%);
            margin: 10px 16px 24px; padding: 26px; border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }
        .wallet-label { font-size: 13px; opacity: 0.8; margin-bottom: 6px; }
        .wallet-balance { font-size: 34px; font-weight: 800; display: flex; align-items: baseline; }
        .wallet-balance small { font-size: 18px; margin-left: 8px; font-weight: 400; }

        /* 列表区域 */
        .market-section { width: 100%; max-width: 500px; padding: 0 16px 140px; }
        .item-card { background: var(--card-bg); border-radius: 22px; padding: 22px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .item-topic { font-size: 18px; font-weight: 700; margin-bottom: 15px; }
        .item-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); }
        
        .bet-btn { background: rgba(38, 161, 123, 0.15); color: var(--primary-light); border: none; padding: 8px 18px; border-radius: 15px; font-size: 14px; font-weight: 700; }

        /* 底部固定按钮 */
        .action-bar { position: fixed; bottom: 25px; width: calc(100% - 32px); max-width: 468px; z-index: 1000; }
        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 20px; border-radius: 22px; font-size: 17px; font-weight: 700; box-shadow: 0 10px 25px rgba(38, 161, 123, 0.4); display: flex; justify-content: center; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="brand">🚀 中国<span>预测市场</span></div>
        <div id="user-info" style="font-size: 13px; color: var(--text-dim);">TRC20 环境</div>
    </div>

    <div class="wallet-card">
        <div class="wallet-label">账户余额 (TRC20-USDT)</div>
        <div class="wallet-balance" id="balance">0.00 <small>USDT</small></div>
    </div>

    <div class="market-section">
        <div id="market-list"></div>
    </div>

    <div class="action-bar">
        <button class="btn-main" onclick="openDeposit()">
            <span>🔌 连接 TRC20 钱包</span>
        </button>
    </div>

    <script>
        const SB_URL = "https://kfalyawduveuuttniiun.supabase.co";
        const SB_KEY = "sb_publishable_6mBG3xWhYAHCOEmNIG4BEA_wh5O2Ayx";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const tg = window.Telegram.WebApp;

        async function loadMarkets() {
            const { data } = await supabaseClient.from('markets').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('market-list').innerHTML = data.map(item => `
                    <div class="item-card">
                        <div class="item-topic">📊 ${item.topic || '预测话题'}</div>
                        <div class="item-footer">
                            <div style="font-size:14px; color:#81b3d2;">奖池 <b>${item.pool || 0}</b> USDT</div>
                            <button class="bet-btn">参与</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function openDeposit() {
            tg.showPopup({
                title: '选择连接方式',
                message: '由于在 Telegram 内直接调用 TRC20 需要中间协议，建议使用：',
                buttons: [
                    {id: 'link', type: 'default', text: '复制充值地址'},
                    {id: 'cancel', type: 'destructive', text: '取消'}
                ]
            }, (id) => {
                if(id === 'link') {
                    tg.showAlert("您的收款地址已生成：\nTY6....(演示地址)\n请转账后系统将自动同步余额。");
                }
            });
        }

        window.onload = () => {
            tg.ready();
            loadMarkets();
        };
    </script>
</body>
</html>
