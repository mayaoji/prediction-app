<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #0e1621; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #17212b; border-radius: 12px; padding: 20px; width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        #ton-connect-button { margin-bottom: 20px; min-height: 44px; }
        button { background: #248bcf; color: white; border: none; border-radius: 8px; padding: 14px; font-weight: bold; width: 100%; cursor: pointer; }
        .market-item { background: #242f3d; padding: 15px; border-radius: 10px; margin-bottom: 10px; width: 100%; max-width: 400px; border-left: 4px solid #248bcf; }
    </style>
</head>
<body>
    <h1>🚀 中国预测市场</h1>
    <div id="ton-connect-button"></div>
    
    <div class="card">
        <button onclick="createNewMarket()">📝 发起新预测 (0.1 TON)</button>
    </div>

    <div id="market-list">正在连接云端...</div>

    <script>
        const supabaseUrl = 'https://kfalyawduveuuttniun.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYWx5YXdkdXZldXV0dG5paXVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODE2MjQsImV4cCI6MjA5MjQ1NzYyNH0.YdlWOljkvsimq628KSxw99bpvmyN8Bsdza15uFoEs_0';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://mayaoji.github.io/prediction-app/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function loadMarkets() {
            const { data, error } = await supabaseClient.from('markets').select('*').order('id', { ascending: false });
            const listDiv = document.getElementById('market-list');
            if (data && data.length > 0) {
                listDiv.innerHTML = data.map(m => `
                    <div class="market-item">
                        <strong>${m.topic}</strong><br>
                        <small>奖池: ${m.pool} TON</small>
                    </div>
                `).join('');
            } else {
                listDiv.innerHTML = "暂无数据，请尝试下拉刷新";
            }
        }

        async function createNewMarket() {
            const topic = prompt("输入预测话题:");
            if (!topic) return;
            try {
                await tonConnectUI.sendTransaction({
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [{ address: "UQAb_7Mh7ZqfS_388mQ6E9vG_B6fKxH7O7X7_tZ_Az2y", amount: "100000000" }]
                });
                await supabaseClient.from('markets').insert([{ topic: topic, pool: 0.1 }]);
                alert("发布成功！");
                loadMarkets();
            } catch (e) { alert("失败: " + e.message); }
        }

        window.onload = loadMarkets;
    </script>
</body>
</html>
