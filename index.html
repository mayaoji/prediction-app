<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.2/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: -apple-system, sans-serif; background-color: #0e1621; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: #17212b; border-radius: 12px; padding: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px; }
        #ton-connect-button { margin: 20px 0; min-height: 40px; } /* 确保钱包按钮有占位空间 */
        button { background: #248bcf; color: white; border: none; border-radius: 8px; padding: 14px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .refresh-btn { background: #2b5278; font-size: 14px; }
        .status-tag { color: #81b3d2; font-size: 13px; margin-bottom: 10px; }
        #market-list { width: 100%; max-width: 400px; }
        .market-item { background: #242f3d; padding: 16px; border-radius: 10px; margin-bottom: 12px; border-left: 4px solid #248bcf; }
        .market-item strong { display: block; font-size: 17px; margin-bottom: 5px; }
        .market-item small { color: #81b3d2; }
    </style>
</head>
<body>

    <h1>🚀 中国预测市场</h1>
    
    <div id="ton-connect-button"></div>
    
    <div class="card">
        <div class="status-tag" id="status">📡 云端同步：已就绪</div>
        <button onclick="createNewMarket()">📝 发起新预测 (0.1 TON)</button>
        <button class="refresh-btn" onclick="loadMarkets()">🔄 刷新数据</button>
    </div>

    <div id="market-list">
        <p style="text-align: center; color: #5a6e82;">正在获取最新预测...</p >
    </div>

    <script>
        // 1. 初始化 Supabase (直接从全局变量获取)
        const supabaseUrl = 'https://kfalyawduveuuttniun.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYWx5YXdkdXZldXV0dG5paXVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODE2MjQsImV4cCI6MjA5MjQ1NzYyNH0.YdlWOljkvsimq628KSxw99bpvmyN8Bsdza15uFoEs_0';
        
        let supabaseClient;
        try {
            supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        } catch (e) {
            console.error("Supabase 加载失败", e);
        }

        // 2. 初始化 TON Connect (钱包按钮)
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://mayaoji.github.io/prediction-app/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        // 3. 创建话题逻辑
        async function createNewMarket() {
            const topic = prompt("请输入预测话题：");
            if (!topic) return;

            try {
                // 检查钱包连接
                if (!tonConnectUI.connected) {
                    alert("请先连接 TON 钱包！");
                    return;
                }

                await tonConnectUI.sendTransaction({
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [{
                        address: "UQAb_7Mh7ZqfS_388mQ6E9vG_B6fKxH7O7X7_tZ_Az2y",
                        amount: "100000000"
                    }]
                });

                document.getElementById('status').innerText = "📡 正在保存到云端...";
                
                const { error } = await supabaseClient
                    .from('markets')
                    .insert([{ topic: topic, pool: 0.1 }]);

                if (error) throw error;

                alert("✅ 发布成功！");
                loadMarkets(); 

            } catch (e) {
                alert("失败：" + (e.message || "用户取消"));
            }
        }

        // 4. 加载列表逻辑
        async function loadMarkets() {
            try {
                const { data, error } = await supabaseClient
                    .from('markets')
                    .select('*')
                    .order('id', { ascending: false });

                const listDiv = document.getElementById('market-list');
                if (data && data.length > 0) {
                    listDiv.innerHTML = data.map(m => `
                        <div class="market-item">
                            <strong>话题：${m.topic}</strong>
                            <small>奖池：${m.pool} TON</small>
                        </div>
                    `).join('');
                } else {
                    listDiv.innerHTML = '<p style="text-align: center; color: #5a6e82;">暂无数据，请刷新</p >';
                }
            } catch (e) {
                document.getElementById('market-list').innerHTML = '<p style="color:red">加载失败，请检查网络</p >';
            }
        }

        // 页面启动
        window.onload = loadMarkets;
    </script>
</body>
</html>
