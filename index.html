<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@2.0.9/dist/tonconnect-sdk.min.js"></script>
    <style>
        body { background-color: #F3F4F6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        .drawer-overlay { display: none; background: rgba(0,0,0,0.5); position: fixed; inset: 0; z-index: 40; }
        .drawer { transform: translateY(100%); transition: transform 0.3s ease-out; position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top-left-radius: 20px; border-top-right-radius: 20px; z-index: 50; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        .drawer.active { transform: translateY(0); }
        .dark-btn { background-color: #374151; color: white; transition: opacity 0.2s; }
        .dark-btn:active { opacity: 0.8; }
        .gray-btn { background-color: #E5E7EB; color: #374151; }
    </style>
</head>
<body onload="initApp()">

    <header class="bg-white p-4 flex justify-between items-center sticky top-0 z-10 border-b">
        <h1 class="text-lg font-bold text-gray-700">中国预测市场</h1>
        <button id="connect-btn" onclick="handleConnect()" class="text-sm bg-gray-100 px-3 py-1 rounded-full border border-gray-300">连接钱包</button>
    </header>

    <main class="p-4 space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="font-bold text-gray-800 text-md mb-4">小鹏 2026年Q2交付量突破 50,000 辆？</h2>
            <div class="flex space-x-3">
                <button onclick="openDrawer('Yes', 65)" class="flex-1 dark-btn py-3 rounded-xl font-bold">Yes (65%)</button>
                <button onclick="openDrawer('No', 35)" class="flex-1 gray-btn py-3 rounded-xl font-bold">No (35%)</button>
            </div>
        </div>
    </main>

    <div id="overlay" class="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="drawer" class="drawer">
        <div class="flex justify-between items-center mb-6">
            <h3 id="drawer-title" class="text-lg font-bold">下注</h3>
            <button onclick="closeDrawer()" class="text-gray-400 text-2xl">&times;</button>
        </div>
        
        <input type="number" id="amount" placeholder="0.00" oninput="updateProfit()" class="w-full text-3xl font-bold border-b-2 border-gray-200 focus:border-gray-800 outline-none py-2 mb-4">
        
        <div class="grid grid-cols-4 gap-2 mb-6">
            <button onclick="setAmount(10)" class="bg-gray-100 py-2 rounded-lg text-sm text-gray-600">10</button>
            <button onclick="setAmount(50)" class="bg-gray-100 py-2 rounded-lg text-sm text-gray-600">50</button>
            <button onclick="setAmount(100)" class="bg-gray-100 py-2 rounded-lg text-sm text-gray-600">100</button>
            <button onclick="setAmount(500)" class="bg-gray-100 py-2 rounded-lg text-sm text-gray-600">全部</button>
        </div>

        <button id="pay-btn" onclick="handlePay()" class="w-full dark-btn py-4 rounded-2xl font-bold text-lg">确认下注</button>
    </div>

    <script>
        let connector;
        let currentProb = 0;

        function initApp() {
            // 初始化 SDK [cite: 2026-04-25]
            connector = new TonConnectSDK.TonConnect({
                manifestUrl: 'https://mayaoji.github.io/tonconnect-manifest.json'
            });

            // 监听状态
            connector.onStatusChange(wallet => {
                const btn = document.getElementById('connect-btn');
                if (wallet) {
                    const addr = wallet.account.address;
                    btn.innerText = addr.substring(0,4) + '...' + addr.substring(addr.length-4);
                    btn.classList.add('text-blue-600', 'bg-blue-50');
                } else {
                    btn.innerText = "连接钱包";
                    btn.classList.remove('text-blue-600', 'bg-blue-50');
                }
            });

            connector.restoreConnection();
        }

        async function handleConnect() {
            if (connector.connected) {
                await connector.disconnect();
            } else {
                // 专门针对手机 Chrome 优化的连接跳转
                const walletLink = connector.connect({
                    universalLink: 'https://app.okx.com/ton-connect',
                    bridgeUrl: 'https://bridge.tonapi.io/bridge'
                });
                window.location.href = walletLink;
            }
        }

        async function handlePay() {
            if (!connector.connected) {
                alert("钱包未连接");
                handleConnect();
                return;
            }

            const amt = document.getElementById('amount').value;
            if (!amt || amt <= 0) { alert("请输入金额"); return; }

            const payBtn = document.getElementById('pay-btn');
            payBtn.innerText = "正在唤起钱包...";
            payBtn.disabled = true;

            // 构造交易对象
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300, 
                messages: [{
                    address: "UQCbO0NSAoAbfPyh1tPUZP-Npt66hqLQUiCunSWnfcEMAz2y",
                    amount: (amt * 1000000000).toString() 
                }]
            };

            try {
                // 执行支付：这行代码会尝试直接打开手机上的钱包签名页 [cite: 2026-04-25]
                const result = await connector.sendTransaction(transaction);
                alert("支付指令已提交！");
                closeDrawer();
            } catch (e) {
                console.error("支付失败详情:", e);
                // 核心修复：如果没反应，手动弹窗提示引导
                alert("如果没弹出支付，请确保 OKX 或 Tonkeeper 正在后台运行。");
            } finally {
                payBtn.innerText = "确认下注";
                payBtn.disabled = false;
            }
        }

        // UI 辅助函数
        function openDrawer(type, prob) {
            currentProb = prob;
            document.getElementById('drawer-title').innerText = `下注: ${type}`;
            document.getElementById('overlay').style.display = 'block';
            setTimeout(() => document.getElementById('drawer').classList.add('active'), 10);
        }
        function closeDrawer() {
            document.getElementById('drawer').classList.remove('active');
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
        }
        function setAmount(val) { document.getElementById('amount').value = val; updateProfit(); }
        function updateProfit() {
            let amt = document.getElementById('amount').value;
            let potential = amt > 0 ? (amt * (100 / currentProb)).toFixed(2) : "0.00";
            // 这里可以增加收益显示的逻辑
        }
    </script>
</body>
</html>
