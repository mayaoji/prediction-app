<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国预测市场 - 稳定版</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0a2540; color: white; text-align: center; padding: 20px; }
        .market-card { background: rgba(255,255,255,0.1); margin: 15px auto; padding: 15px; border-radius: 12px; text-align: left; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-main { padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; background: #0088cc; color: white; border: none; margin: 10px auto; width: 85%; display: block; }
        #status { font-size: 12px; color: #90ee90; height: 20px; }
    </style>
</head>
<body>

    <h1>🚀 中国预测市场</h1>
    <div id="connect-btn-root"></div>
    <div id="status">正在检查连接...</div>

    <button class="btn-main" onclick="createMarket()">📝 发起新预测 (0.1 TON)</button>
    <button class="btn-main" style="background:#444;" onclick="fetchMarkets()">🔄 刷新列表</button>

    <div id="market-list" style="margin-top:20px;">等待加载...</div>

    <script>
        const S_URL = "https://kfalyawduveuuttniun.supabase.co"; 
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYWx5YXdkdXZldXV0dG5paXVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODE2MjQsImV4cCI6MjA5MjQ1NzYyNH0.YdlWOljkvsimq628KSxw99bpvmyN8Bsdza15uFoEs_0"; 
        const MY_ADDR = "UQCbO0NSAoAbfPyh1tPUZP-Npt66hqLQUiCunSWnfcEMAz2y"; 

        const supabaseClient = supabase.createClient(S_URL, S_KEY);
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://mayaoji.github.io/prediction-app/tonconnect-manifest.json',
            buttonRootId: 'connect-btn-root'
        });

        // 刷新列表，带报错捕获
        async function fetchMarkets() {
            const listDiv = document.getElementById('market-list');
            try {
                const { data, error } = await supabaseClient.from('markets').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                listDiv.innerHTML = data.length ? data.map(m => `
                    <div class="market-card">
                        <div style="float:right; color:#facc15;">${m.pool} TON</div>
                        <h3 style="margin:0;">${m.topic}</h3>
                    </div>
                `).join('') : "暂无数据";
            } catch (e) {
                listDiv.innerHTML = "<p style='color:red;'>加载失败: 网络不稳定，请尝试切换WiFi/5G并刷新</p >";
            }
        }

        // 发起话题
        async function createMarket() {
            if (!tonConnectUI.connected) return alert("请先连接钱包");
            
            const topic = prompt("输入预测话题：");
            const pool = prompt("输入奖池金额：", "0.1");
            if (!topic || !pool) return;

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{ address: MY_ADDR, amount: (parseFloat(pool) * 1000000000).toString() }]
            };

            try {
                // 1. 尝试发起交易
                await tonConnectUI.sendTransaction(transaction);
                alert("支付指令已提交！支付完成后，请回到页面点确定同步。");
                
                // 2. 支付成功后强制写入
                await writeToDB(topic, pool);
            } catch (e) {
                // 关键点：如果报错是因为 Load failed，但你确定已经付过钱了
                if (confirm("支付成功了吗？如果 OKX 已扣款，请点确定强制发布话题。")) {
                    await writeToDB(topic, pool);
                }
            }
        }

        // 独立的数据库写入函数
        async function writeToDB(topic, pool) {
            document.getElementById('status').innerText = "正在尝试写入云端...";
            const { error } = await supabaseClient.from('markets').insert([{ topic, pool: parseFloat(pool) }]);
            if (error) {
                alert("同步失败: " + error.message + "。请确认网络通畅后重试刷新。");
            } else {
                alert("🎉 预测发布成功！");
                fetchMarkets();
            }
        }

        tonConnectUI.onStatusChange(w => {
            document.getElementById('status').innerText = w ? "✅ 钱包已连接" : "❌ 未连接";
            fetchMarkets();
        });
        fetchMarkets();
    </script>
</body>
</html>
