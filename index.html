<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国预测市场 - 强制同步版</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #0a2540, #1e3a8a); color: white; text-align: center; min-height: 100vh; padding: 20px; }
        .market-card { background: rgba(255,255,255,0.1); margin: 15px auto; padding: 20px; border-radius: 12px; text-align: left; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-yes { background: #22c55e; border: none; color: white; padding: 10px; border-radius: 6px; width: 48%; cursor: pointer; }
        .btn-no { background: #ef4444; border: none; color: white; padding: 10px; border-radius: 6px; width: 48%; cursor: pointer; }
        #connect-btn-root { margin: 20px 0; display: flex; justify-content: center; }
        .btn-main { padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; background: white; color: #0a2540; border: none; margin: 5px; }
        #wallet-status { font-size: 12px; color: #90ee90; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>🚀 中国预测市场</h1>
    <div id="connect-btn-root"></div>
    <div id="wallet-status">等待连接钱包...</div>

    <div style="margin-bottom: 20px;">
        <button class="btn-main" onclick="createMarket()">📝 发起新预测</button>
        <button class="btn-main" style="background:rgba(255,255,255,0.2); color:white;" onclick="fetchMarkets()">🔄 刷新列表</button>
    </div>

    <div id="market-list">正在从云端读取预测...</div>

    <script>
        // ======= 配置信息 (已校对) =======
        const S_URL = "https://kfalyawduveuuttniun.supabase.co"; 
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYWx5YXdkdXZldXV0dG5paXVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODE2MjQsImV4cCI6MjA5MjQ1NzYyNH0.YdlWOljkvsimq628KSxw99bpvmyN8Bsdza15uFoEs_0"; 
        const MY_ADDR = "UQCbO0NSAoAbfPyh1tPUZP-Npt66hqLQUiCunSWnfcEMAz2y"; 

        const supabaseClient = supabase.createClient(S_URL, S_KEY);
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://mayaoji.github.io/prediction-app/tonconnect-manifest.json',
            buttonRootId: 'connect-btn-root'
        });

        // 1. 刷新列表函数
        async function fetchMarkets() {
            const listDiv = document.getElementById('market-list');
            try {
                const { data, error } = await supabaseClient
                    .from('markets')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                if (!data || data.length === 0) {
                    listDiv.innerHTML = "<p style='color:#aaa;'>目前暂无预测，快去发布一个吧！</p >";
                } else {
                    listDiv.innerHTML = data.map(m => `
                        <div class="market-card">
                            <div style="float:right; color:#facc15;">奖池: ${m.pool} TON</div>
                            <h3 style="margin:0 0 15px 0;">${m.topic}</h3>
                            <div style="display:flex; justify-content:space-between;">
                                <button class="btn-yes">押注 YES</button>
                                <button class="btn-no">押注 NO</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                listDiv.innerHTML = "<p style='color:#ff4444;'>数据加载失败，请检查网络</p >";
                console.error(e);
            }
        }

        // 2. 发起预测函数 (优化版：忽略钱包回执干扰，强制写入)
        async function createMarket() {
            if (!tonConnectUI.connected) return alert("请先连接钱包");
            
            const topic = prompt("请输入预测的话题 (如：明天会下雨吗？)");
            if (!topic) return;
            const poolAmt = prompt("注入奖池金额 (推荐 0.1 TON):", "0.1");
            if (!poolAmt) return;

            const numericPool = parseFloat(poolAmt);
            // 手续费 0.01 TON
            const totalNano = Math.floor((numericPool + 0.01) * 1000000000);

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{ address: MY_ADDR, amount: totalNano.toString() }]
            };

            try {
                // 唤起支付，但不强制等待它的“成功回执”
                tonConnectUI.sendTransaction(transaction);
                
                // 只要唤起后，立刻询问用户是否已在钱包完成支付
                if(confirm("请在钱包完成支付后，点击确定同步数据。")) {
                    const { error } = await supabaseClient
                        .from('markets')
                        .insert([{ 
                            topic: topic.trim(), 
                            pool: numericPool 
                        }]);

                    if (error) {
                        alert("数据库写入失败：" + error.message);
                    } else {
                        alert("🎉 预测发布成功！");
                        fetchMarkets();
                    }
                }
            } catch (e) {
                alert("遇到错误，请重试。");
            }
        }

        // 钱包状态监听
        tonConnectUI.onStatusChange(w => {
            const status = document.getElementById('wallet-status');
            if (w) {
                status.innerText = "已连接: " + w.account.address.slice(0,4) + "..." + w.account.address.slice(-4);
                fetchMarkets(); // 连接成功自动加载数据
            } else {
                status.innerText = "钱包未连接";
            }
        });

        // 页面打开自动加载
        fetchMarkets();
    </script>
</body>
</html>
