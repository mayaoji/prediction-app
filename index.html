<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国预测市场</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(to bottom, #0088cc, #005f99);
            color: white;
            text-align: center;
        }
        h1 { font-size: 28px; margin: 20px 0; }
        button {
            padding: 16px 28px;
            margin: 10px 5px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            width: 90%;
            max-width: 320px;
        }
        .connect-btn { background: #1a73e8; color: white; }
        .yes-btn { background: #4CAF50; color: white; }
        .no-btn { background: #f44336; color: white; }
        .market {
            background: rgba(255,255,255,0.25);
            margin: 15px 0;
            padding: 20px;
            border-radius: 16px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🚀 中国预测市场</h1>
    <p>欢迎，<span id="user">朋友</span>！</p >
    
    <button onclick="connectWallet()" class="connect-btn">🔗 连接 TON 钱包</button>
    <button onclick="createMarket()">📝 发布新预测</button>
    <button onclick="viewMarkets()">📋 查看所有预测</button>

    <div id="result" style="margin-top:30px;"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : {};
        document.getElementById("user").textContent = user.first_name || "朋友";

        let markets = JSON.parse(localStorage.getItem('markets') || '[]');
        let walletConnected = false;

        function connectWallet() {
            tg.showAlert("TON 钱包连接功能已准备好！\n\n目前为演示模式\n实际支付开发中...");
            walletConnected = true;
            tg.showAlert("✅ 钱包已模拟连接成功！\n现在可以进行买入操作。");
        }

        function createMarket() {
            const title = prompt("请输入预测标题：\n例如：Sora 本月会向中国用户开放吗？");
            if (!title || title.trim() === "") {
                tg.showAlert("标题不能为空！");
                return;
            }

            markets.push({
                id: Date.now(),
                title: title.trim(),
                creator: user.first_name || "匿名",
                time: new Date().toLocaleString('zh-CN'),
                yes: 0,
                no: 0
            });

            localStorage.setItem('markets', JSON.stringify(markets));
            tg.showAlert("✅ 发布成功！");
            viewMarkets();
        }

        function viewMarkets() {
            let html = "<h2>当前活跃预测：</h2>";
            if (markets.length === 0) {
                html += "<p>还没有预测，快去发布第一个吧！</p >";
            } else {
                for (var i = 0; i < markets.length; i++) {
                    var m = markets[i];
                    html += '<div class="market">';
                    html += '<b>' + m.title + '</b><br>';
                    html += '<small>发布者：' + m.creator + ' | ' + m.time + '</small><br><br>';
                    html += '<button class="yes-btn" onclick="buyYes(' + m.id + ')">买入 Yes</button>';
                    html += '<span style="margin-left
