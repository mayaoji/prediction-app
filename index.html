<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>预测市场 - 数据共享打通版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#0e1621; color:white; font-family:sans-serif; text-align:center; padding:20px; }
        .card { background:#17212b; padding:15px; border-radius:12px; margin:10px auto; max-width:400px; text-align:left; border-left:4px solid #248bcf; }
    </style>
</head>
<body>
    <h1>🚀 中国预测市场</h1>
    <div id="status" style="color:#81b3d2; font-size:12px;">正在连接云端...</div>
    <div id="list"></div>

    <script>
        const SB_URL = 'https://kfalyawduveuuttniun.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYWx5YXdkdXZldXV0dG5paXVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODE2MjQsImV4cCI6MjA5MjQ1NzYyNH0.YdlWOljkvsimq628KSxw99bpvmyN8Bsdza15uFoEs_0';

        async function init() {
            try {
                // 强制使用不带缓存的请求
                const client = supabase.createClient(SB_URL, SB_KEY, {
                    auth: { persistSession: false }
                });

                const { data, error } = await client.from('markets').select('*').order('id', { ascending: false });

                if (error) throw error;

                document.getElementById('status').innerText = "✅ 数据同步成功";
                document.getElementById('list').innerHTML = data.map(m => `
                    <div class="card">
                        <strong>${m.topic}</strong><br>
                        <small>💰 奖池: ${m.pool} TON</small>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('status').innerHTML = `<b style="color:red;">连接失败: ${e.message}</b><br>请检查Supabase后台设置`;
            }
        }
        window.onload = init;
    </script>
</body>
</html>
