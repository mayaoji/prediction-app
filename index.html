    <div id="list" style="margin-top:30px; max-width:400px; margin-left:auto; margin-right:auto;">

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // ==================== TON Connect 初始化 ====================
        let tonConnectUI = null;

        async function initTonConnect() {
            try {
                tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                    manifestUrl: 'https://mayaoji.github.io/prediction-app/tonconnect-manifest.json',
                    buttonRootId: 'ton-connect-button'
                });

                tonConnectUI.onStatusChange((wallet) => {
                    const infoDiv = document.getElementById('wallet-info');
                    if (wallet) {
                        const addr = wallet.account.address;
                        const short = addr.slice(0, 6) + '...' + addr.slice(-4);
                        infoDiv.innerHTML = `✅ 已连接: <span style="font-family:monospace;">${short}</span>`;
                    } else {
                        infoDiv.innerHTML = '未连接钱包';
                    }
                });
            } catch (error) {
                console.error("TON Connect 初始化失败:", error);
            }
        }

        // ==================== 加载列表 ====================
        async function load() {
            try {
                const { data } = await supabaseClient
                    .from('markets')
                    .select('*')
                    .order('id', { ascending: false });

                const listDiv = document.getElementById('list');
                if (data && data.length > 0) {
                    listDiv.innerHTML = data.map(m => `
                        <div class="card">
                            <strong>${m.topic}</strong><br>
                            <small style="color:#81b3d2;">💰 奖池: ${m.pool || 0.1} TON</small>
                        </div>
                    `).join('');
                } else {
                    listDiv.innerHTML = `<p style="color:#aaa; text-align:center;">暂无预测，快来发起第一个吧！</p >`;
                }
            } catch (err) {
                document.getElementById('list').innerHTML = `<p style="color:red;">数据库加载失败</p >`;
            }
        }
