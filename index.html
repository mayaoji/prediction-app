<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: #0e1621;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .header {
            margin-bottom: 35px;
        }
        h1 {
            font-size: 32px;           /* 字体变小 */
            margin: 8px 0 6px 0;
            font-weight: bold;
        }
        .subtitle {
            font-size: 21px;           /* Polymarket China 字体加大 */
            color: white;              /* 改为白色 */
            margin: 0 0 35px 0;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        button {
            background: #248bcf;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            max-width: 380px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 17px;
            margin: 12px auto;
            display: block;
            cursor: pointer;
        }
        .card {
            background: #17212b;
            padding: 18px;
            border-radius: 12px;
            margin: 15px auto;
            max-width: 380px;
            text-align: left;
            border-left: 4px solid #248bcf;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>中国预测市场</h1>
        <div class="subtitle">Polymarket China</div>
    </div>

    <button onclick="connectWallet()">🔗 连接 TON 钱包</button>
    <button onclick="publish()">📝 发起新预测</button>

    <div id="list" style="margin-top: 35px;"></div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://kfalyawduveuuttniun.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYWx5YXdkdXZldXV0dG5paXVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODE2MjQsImV4cCI6MjA5MjQ1NzYyNH0.YdlWOljkvsimq628KSxw99bpvmyN8Bsdza15uFoEs_0'
        );

        async function connectWallet() {
            alert("TON 钱包连接功能开发中...");
        }

        async function publish() {
            const topic = prompt("请输入预测话题：");
            if (!topic) return;
            
            try {
                await supabaseClient.from('markets').insert([{ topic: topic.trim(), pool: 0.1 }]);
                alert("✅ 发布成功！");
                loadList();
            } catch (e) {
                alert("发布失败");
            }
        }

        async function loadList() {
            const { data } = await supabaseClient.from('markets').select('*').order('id', { ascending: false });
            const listDiv = document.getElementById('list');
            
            if (data && data.length > 0) {
                listDiv.innerHTML = data.map(m => `
                    <div class="card">
                        <strong>${m.topic}</strong><br>
                        <small style="color:#81b3d2;">💰 奖池: ${m.pool} USDT</small>
                    </div>
                `).join('');
            } else {
                listDiv.innerHTML = `<div style="color:#666; text-align:center; padding:30px 0;">暂无预测数据，快来发起第一个吧！</div>`;
            }
        }

        window.onload = loadList;
    </script>
</body>
</html>
