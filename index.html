<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background-color: #0d1117; 
            color: #e6edf3; 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            padding: 16px; 
        }
        .header { text-align: center; margin-bottom: 24px; }
        .logo { font-size: 52px; }
        .market-card { 
            background: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 16px; 
            padding: 20px; 
            margin-bottom: 20px; 
        }
        h2 { color: #d4af37; margin: 0 0 12px 0; font-size: 1.25rem; }
        .stats { display: flex; justify-content: space-between; color: #8b949e; margin: 12px 0; }
        .btn-group { display: flex; gap: 12px; margin: 20px 0; }
        button { 
            flex: 1; 
            padding: 16px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
        }
        .btn-yes { background: #238636; color: white; }
        .btn-no { background: #da3633; color: white; }
        .wallet-btn { 
            background: #58a6ff; 
            color: white; 
            padding: 16px; 
            border-radius: 12px; 
            text-align: center; 
            font-weight: bold; 
            margin: 12px 0; 
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">♾️</div>
        <h1>中国预测市场</h1>
        <p style="color:#8b949e; margin-top:4px;">去中心化 · 链上结算</p >
    </div>

    <div class="market-card">
        <h2>📊 Sora 4月内全球开放预测</h2>
        <div class="stats">
            <span>奖池: 1,280 USDT</span>
            <span>参与: 142 人</span>
        </div>
        
        <div class="btn-group">
            <button class="btn-yes" onclick="bet('YES')">看好 YES (68%)</button>
            <button class="btn-no" onclick="bet('NO')">看跌 NO (32%)</button>
        </div>

        <div onclick="connectWallet()" class="wallet-btn">
            🔗 连接 Phantom 钱包下注
        </div>
    </div>

    <script>
        // 初始化 Telegram Mini App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();           // 让页面占满整个 Telegram 窗口
        tg.MainButton.hide();  // 隐藏底部按钮

        function connectWallet() {
            tg.showAlert("正在连接 Phantom 钱包...\n\n（开发中，很快就能真实下注）");
        }

        function bet(side) {
            tg.showConfirm(`确定要下注 ${side} 吗？`, function(confirmed) {
                if (confirmed) {
                    tg.showAlert(`✅ 已提交 ${side} 下注！\n\n资金将进入智能合约`);
                }
            });
        }

        // 显示用户名称（可选）
        console.log("欢迎", tg.initDataUnsafe?.user?.first_name || "用户");
    </script>
</body>
</html>
