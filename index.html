<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国预测市场</title>
    <style>
        body {
            background: #0e1621;
            color: white;
            font-family: -apple-system, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        h1 { font-size: 38px; margin: 30px 0 10px; }
        p { color: #81b3d2; }
        button {
            background: #248bcf;
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 17px;
            border-radius: 12px;
            margin: 15px auto;
            display: block;
            width: 90%;
            max-width: 360px;
            cursor: pointer;
        }
        .card {
            background: #17212b;
            padding: 20px;
            border-radius: 12px;
            margin: 20px auto;
            max-width: 360px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🚀 中国预测市场</h1>
    <p>Polymarket China</p >

    <button onclick="alert('TON 钱包连接功能开发中...')">🔗 连接 TON 钱包</button>
    <button onclick="publish()">📝 发起新预测</button>

    <div id="list" style="margin-top:30px;"></div>

    <script>
        async function publish() {
            const topic = prompt("请输入预测话题：");
            if (topic) {
                alert("✅ 发布成功！（模拟）\n话题：" + topic);
                loadList();
            }
        }

        function loadList() {
            document.getElementById('list').innerHTML = `
                <div class="card">
                    <strong>欢迎使用</strong><br>
                    <small>数据共享已打通，功能正在完善中...</small>
                </div>
            `;
        }

        window.onload = loadList;
    </script>
</body>
</html>
