<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国预测市场</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0088cc, #005f99);
            color: white;
            text-align: center;
            min-height: 100vh;
        }
        h1 { font-size: 34px; margin: 25px 0 10px; }
        p { font-size: 19px; margin-bottom: 30px; }
        button {
            padding: 18px 28px;
            margin: 12px 6px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            width: 92%;
            max-width: 360px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }
        .connect-btn { background: linear-gradient(#1a73e8, #1557b0); color: white; }
        .yes-btn { background: #4CAF50; color: white; }
        .no-btn { background: #f44336; color: white; }
        .market {
            background: rgba(255,255,255,0.22);
            margin: 18px 0;
            padding: 24px;
            border-radius: 22px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🚀 中国预测市场</h1>
    <p>欢迎，<span id="user">朋友</span>！</p >

    <button onclick="connectWallet()" class="connect-btn">🔗 连接 TON 钱包</button>
    <button onclick="createMarket()">📝 发布新预测</button>
    <button onclick="viewMarkets()">📋 查看所有预测</button>

    <div id="result" style="margin-top:35px;"></div>

    <script>
        let markets = JSON.parse(localStorage.getItem("markets") || "[]");
        let walletConnected = false;

        function connectWallet() {
            walletConnected = true;
            alert("✅ TON 钱包已连接！\n现在可以正常买入份额了。\n（真实支付开发中）");
        }

        function createMarket() {
            const title = prompt("请输入预测标题：\n例如：Sora 本月会向中国用户开放吗？");
            if (!title || title.trim() === "") {
                alert("标题不能为空！");
                return;
            }
            markets.push({
                id: Date.now(),
                title: title.trim(),
                creator: "用户",
                time: new Date().toLocaleString("zh-CN"),
                yes: 0,
                no: 0
            });
            localStorage.setItem("markets", JSON.stringify(markets));
            alert("✅ 发布成功！");
            viewMarkets();
        }

        function viewMarkets() {
            let html = "<h2>当前活跃预测：</h2>";
            if (markets.length === 0) {
                html += "<p>还没有预测，快去发布第一个吧！</p >";
            } else {
                for (var i = 0; i < markets.length; i++) {
                    var m = markets[i];
                    var total = (m.yes || 0) + (m.no || 0) || 1;
                    var yesP = Math.round(((m.yes || 0) / total) * 100);
                    var noP = Math.round(((m.no || 0) / total) * 100);

                    html += `<div class="market">
                        <b>${m.title}</b><br>
                        <small>发布者：${m.creator} | ${m.time}</small><br><br>
                        <button class="yes-btn" onclick="buyYes(\( {m.id})">Yes ( \){yesP}%)</button>
                        <span style="margin-left:15px">${m.yes || 0} 份额</span><br><br>
                        <button class="no-btn" onclick="buyNo(\( {m.id})">No ( \){noP}%)</button>
                        <span style="margin-left:15px">${m.no || 0} 份额</span>
                    </div>`;
                }
            }
            document.getElementById("result").innerHTML = html;
        }

        function buyYes(id) {
            if (!walletConnected) {
                alert("请先点击上方“连接 TON 钱包”！");
                return;
            }
            const amount = prompt("请输入买入 Yes 的份额数量：", "10");
            if (!amount || isNaN(amount) || amount <= 0) return alert("数量无效！");
            
            const tonAmount = (parseFloat(amount) * 0.1).toFixed(2);
            if (confirm(`确认买入 ${amount} 份 Yes？\n需支付约 ${tonAmount} TON`)) {
                for (var i = 0; i < markets.length; i++) {
                    if (markets[i].id === id) {
                        markets[i].yes = (markets[i].yes || 0) + parseInt(amount);
                        break;
                    }
                }
                localStorage.setItem("markets", JSON.stringify(markets));
                alert(`✅ 已买入 ${amount} Yes 份额！`);
                viewMarkets();
            }
        }

        function buyNo(id) {
            if (!walletConnected) {
                alert("请先点击上方“连接 TON 钱包”！");
                return;
            }
            const amount = prompt("请输入买入 No 的份额数量：", "10");
            if (!amount || isNaN(amount) || amount <= 0) return alert("数量无效！");
            
            const tonAmount = (parseFloat(amount) * 0.1).toFixed(2);
            if (confirm(`确认买入 ${amount} 份 No？\n需支付约 ${tonAmount} TON`)) {
                for (var i = 0; i < markets.length; i++) {
                    if (markets[i].id === id) {
                        markets[i].no = (markets[i].no || 0) + parseInt(amount);
                        break;
                    }
                }
                localStorage.setItem("markets", JSON.stringify(markets));
                alert(`✅ 已买入 ${amount} No 份额！`);
                viewMarkets();
            }
        }

        window.onload = viewMarkets;
    </script>
</body>
</html>
