<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #0e1621; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #ton-connect-button { margin-bottom: 20px; }
        .card { background: #17212b; border-radius: 12px; padding: 20px; width: 100%; max-width: 400px; text-align: center; }
        button { background: #248bcf; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .status { color: #81b3d2; font-size: 14px; margin-bottom: 20px; }
        .market-item { background: #242f3d; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #248bcf; text-align: left; }
    </style>
</head>
<body>

    <h1>🚀 中国预测市场</h1>
    <div id="ton-connect-button"></div>
    
    <div class="card">
        <div class="status" id="sync-status">📡 云端大脑已就绪</div>
        <button onclick="createNewMarket()">📝 发起新预测 (0.1 TON)</button>
        <button onclick="loadMarkets()" style="background: #2b5278; margin-top: 15px;">🔄 刷新数据</button>
    </div>

    <div id="market-list" style="margin-top: 30px; width: 100%; max-width: 400px;"></div>

    <script>
        const supabaseUrl = 'https://kfalyawduveuuttniun.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYWx5YXdkdXZldXV0dG5paXVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODE2MjQsImV4cCI6MjA5MjQ1NzYyNH0.YdlWOljkvsimq628KSxw99bpvmyN8Bsdza15uFoEs_0';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://mayaoji.github.io/prediction-app/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function createNewMarket() {
            const topic = prompt("请输入预测话题：");
            if (!topic) return;

            try {
                // 1. 发起支付
                await tonConnectUI.sendTransaction({
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [{
                        address: "UQAb_7Mh7ZqfS_388mQ6E9vG_B6fKxH7O7X7_tZ_Az2y",
                        amount: "100000000"
                    }]
                });

                // 2. 支付成功，准备数据
                const marketData = { type: 'create_market', topic: topic, pool: 0.1 };
                
                // 3. 改变状态文字，给用户心理准备
                document.getElementById('sync-status').innerText = "⏳ 支付成功，正在同步到云端...";

                // 4. 发送数据给机器人
                Telegram.WebApp.sendData(JSON.stringify(marketData));

                // 5. 关键：延迟 2.5 秒再关闭，确保数据完全发给 Render
                setTimeout(() => {
                    Telegram.WebApp.close();
                }, 2500);

            } catch (e) {
                alert("操作取消");
            }
        }

        async function loadMarkets() {
            const { data } = await supabase.from('markets').select('*').order('id', { ascending: false });
            const listDiv = document.getElementById('market-list');
            if (data && data.length > 0) {
                listDiv.innerHTML = data.map(m => `
                    <div class="market-item">
                        <strong>话题：${m.topic}</strong><br>
                        <small>奖池：${m.pool} TON</small>
                    </div>
                `).join('');
            } else {
                listDiv.innerHTML = '<p style="text-align: center; color: #aaa;">暂无数据，请尝试刷新</p >';
            }
        }

        window.onload = loadMarkets;
    </script>
</body>
</html>
