<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场</title>
    <style>
        body {
            background: #0e1621;
            color: white;
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            margin: 30px 0 8px 0;
        }
        .subtitle {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 40px;
        }
        button {
            background: #248bcf;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            max-width: 380px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 17px;
            margin: 12px auto;
            display: block;
            cursor: pointer;
        }
        .card {
            background: #17212b;
            padding: 18px;
            border-radius: 12px;
            margin: 15px auto;
            max-width: 380px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>中国预测市场</h1>
    <div class="subtitle">Polymarket China</div>

    <button onclick="alert('TON 钱包连接功能开发中...')">🔗 连接 TON 钱包</button>
    <button onclick="publish()">📝 发起新预测</button>

    <div id="list" style="margin-top: 40px;"></div>

    <script>
        async function publish() {
            const topic = prompt("请输入预测话题：");
            if (topic) {
                alert("✅ 发布成功！（模拟）\n话题：" + topic);
                loadList();
            }
        }

        function loadList() {
            document.getElementById('list').innerHTML = `
                <div class="card">
                    <strong>测试数据</strong><br>
                    <small>数据共享已打通，功能正在完善...</small>
                </div>
            `;
        }

        window.onload = loadList;
    </script>
</body>
</html>
