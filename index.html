<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场 | TON 版</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --primary: #00d287; /* 恢复图一亮绿色 */
            --bg: #0e1621;
            --card-bg: #17212b;
            --text-main: #ffffff;
            --text-dim: #81b3d2;
        }

        body { 
            background: var(--bg); color: var(--text-main); font-family: sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
        }

        .app-container { width: 100%; max-width: 500px; padding: 18px; }
        
        /* 保持图一的顶部设计 */
        .header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        .brand { font-size: 18px; font-weight: 700; }
        .brand span { color: var(--text-dim); }

        /* 资产卡片 */
        .balance-card {
            background: linear-gradient(135deg, #1c3a5a 0%, #0e1621 100%);
            border-radius: 25px; padding: 25px; margin-bottom: 25px; width: 100%;
        }
        .balance-title { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
        .balance-value { font-size: 32px; font-weight: 800; }

        /* 列表卡片 */
        .market-card {
            background: var(--card-bg); border-radius: 25px;
            padding: 24px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.03);
        }
        .market-topic { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
        .pool-info { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; }
        
        .bet-btn { 
            width: 100%; background: var(--primary); color: #000; border: none; 
            padding: 16px; border-radius: 18px; font-size: 16px; font-weight: 700; 
            box-shadow: 0 4px 15px rgba(0,210,135,0.2);
        }

        /* 底部固定按钮 */
        .footer-action {
            position: fixed; bottom: 20px; width: 90%; max-width: 450px;
            background: #248bcf; color: white; border: none; padding: 18px;
            border-radius: 20px; font-weight: 700; font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="brand">🚀 中国<span>预测市场</span></div>
            <div id="ton-connect"></div> </div>

        <div class="balance-card">
            <div class="balance-title">账户余额 (TON)</div>
            <div class="balance-value">0.00 <span>TON</span></div>
        </div>

        <div id="market-list">
            </div>

        <button class="footer-action" onclick="createNewMarket()">
            发起新预测 (0.1 TON)
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://mayaoji.github.io/prediction-app/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        const SB_URL = "https://kfalyawduveuuttniiun.supabase.co";
        const SB_KEY = "sb_publishable_6mBG3xWhYAHCOEmNIG4BEA_wh5O2Ayx";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // 加载项目列表
        async function loadMarkets() {
            const { data } = await supabaseClient.from('markets').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('market-list').innerHTML = data.map(item => `
                    <div class="market-card">
                        <div class="market-topic">📊 ${item.topic}</div>
                        <div class="pool-info">总奖池: ${item.pool || 0.1} TON</div>
                        <button class="bet-btn" onclick="payWithTon(0.1)">参与预测</button>
                    </div>
                `).join('');
            }
        }

        // TON 支付核心逻辑
        async function payWithTon(amount) {
            if (!tonConnectUI.connected) {
                tg.showAlert("请先点击右上角连接 TON 钱包");
                return;
            }

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 60, // 60秒有效
                messages: [
                    {
                        address: "这里填你的TON钱包地址", 
                        amount: (amount * 1000000000).toString() // 转换为 nanoTON
                    }
                ]
            };

            try {
                tg.HapticFeedback.impactOccurred('heavy');
                await tonConnectUI.sendTransaction(transaction);
                tg.showAlert("支付成功！已参与预测。");
                // 支付成功后可以在这里处理业务逻辑
            } catch (e) {
                console.error(e);
                tg.showAlert("支付已取消或失败");
            }
        }

        window.onload = () => {
            tg.ready();
            tg.expand();
            loadMarkets();
        };
    </script>
</body>
</html>
