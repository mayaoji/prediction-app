<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(to bottom, #0088cc, #005f99);
            color: white;
            text-align: center;
            min-height: 100vh;
            touch-action: manipulation;
        }
        h1 { 
            font-size: 36px; 
            margin: 30px 0 15px; 
        }
        p { 
            font-size: 20px; 
            margin-bottom: 30px; 
        }
        button {
            display: block;
            width: 90%;
            max-width: 360px;
            margin: 15px auto;
            padding: 18px 24px;
            font-size: 19px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .connect { background: #1a73e8; color: white; }
        .publish { background: #ffffff; color: #0088cc; }
        .view { background: #ffffff; color: #0088cc; }
        .yes { background: #4CAF50; color: white; }
        .no { background: #f44336; color: white; }
        .market {
            background: rgba(255,255,255,0.25);
            margin: 20px 0;
            padding: 20px;
            border-radius: 16px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🚀 中国预测市场</h1>
    <p>欢迎，朋友！</p >

    <button class="connect" onclick="connectWallet()">🔗 连接 TON 钱包</button>
    <button class="publish" onclick="createMarket()">📝 发布新预测</button>
    <button class="view" onclick="viewMarkets()">📋 查看所有预测</button>

    <div id="result" style="margin-top:40px; text-align:left; padding:0 10px;"></div>

    <script>
        let markets = JSON.parse(localStorage.getItem("markets") || "[]");
        let walletConnected = false;

        function connectWallet() {
            walletConnected = true;
            alert("✅ TON 钱包已连接！\n现在可以正常买入份额了。");
        }

        function createMarket() {
            const title = prompt("请输入预测标题：\n例如：日本四月会发生大地震吗？");
            if (!title || title.trim() === "") {
                alert("标题不能为空！");
                return;
            }
            markets.push({
                id: Date.now(),
                title: title.trim(),
                creator: "用户",
                time: new Date().toLocaleString("zh-CN"),
                yes: 0,
                no: 0
            });
            localStorage.setItem("markets", JSON.stringify(markets));
            alert("✅ 发布成功！");
            viewMarkets();
        }

        function viewMarkets() {
            let html = "<h2>当前活跃预测：</h2>";
            if (markets.length === 0) {
                html += "<p>还没有预测，快去发布第一个吧！</p >";
            } else {
                for (var i = 0; i < markets.length; i++) {
                    var m = markets[i];
                    var total = (m.yes || 0) + (m.no || 0) || 1;
                    var yesP = Math.round(((m.yes || 0) / total) * 100);
                    var noP = Math.round(((m.no || 0) / total) * 100);

                    html += `<div class="market">
                        <b>${m.title}</b><br>
                        <small>发布者：${m.creator} | ${m.time}</small><br><br>
                        <button class="yes" onclick="buyYes(\( {m.id})">Yes ( \){yesP}%)</button>
                        <span style="margin-left:15px">${m.yes || 0} 份额</span><br><br>
                        <button class="no" onclick="buyNo(\( {m.id})">No ( \){noP}%)</button>
                        <span style="margin-left:15px">${m.no || 0} 份额</span>
                    </div>`;
                }
            }
            document.getElementById("result").innerHTML = html;
        }

        function buyYes(id) {
            if (!walletConnected) return alert("请先连接 TON 钱包！");
            const amount = prompt("请输入买入 Yes 的份额数量：", "10");
            if (!amount || parseInt(amount) <= 0) return alert("数量无效！");
            
            for (var i = 0; i < markets.length; i++) {
                if (markets[i].id === id) {
                    markets[i].yes = (markets[i].yes || 0) + parseInt(amount);
                    break;
                }
            }
            localStorage.setItem("markets", JSON.stringify(markets));
            alert(`✅ 已买入 ${amount} 份 Yes！`);
            viewMarkets();
        }

        function buyNo(id) {
            if (!walletConnected) return alert("请先连接 TON 钱包！");
            const amount = prompt("请输入买入 No 的份额数量：", "10");
            if (!amount || parseInt(amount) <= 0) return alert("数量无效！");
            
            for (var i = 0; i < markets.length; i++) {
                if (markets[i].id === id) {
                    markets[i].no = (markets[i].no || 0) + parseInt(amount);
                    break;
                }
            }
            localStorage.setItem("markets", JSON.stringify(markets));
            alert(`✅ 已买入 ${amount} 份 No！`);
            viewMarkets();
        }

        // 初始化
        window.onload = viewMarkets;
    </script>
</body>
</html>
