<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <style>
        body { background-color: #F3F4F6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .drawer-overlay { display: none; background: rgba(0,0,0,0.5); position: fixed; inset: 0; z-index: 40; }
        .drawer { transform: translateY(100%); transition: transform 0.3s ease-out; position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top-left-radius: 20px; border-top-right-radius: 20px; z-index: 50; padding: 20px; }
        .drawer.active { transform: translateY(0); }
        .dark-btn { background-color: #374151; color: white; }
        .gray-btn { background-color: #E5E7EB; color: #374151; }
    </style>
</head>
<body onload="initApp()">

    <header class="bg-white p-4 flex justify-between items-center sticky top-0 z-10 border-b">
        <h1 class="text-lg font-bold text-gray-700">中国预测市场</h1>
        <button id="connect-btn" onclick="handleConnect()" class="text-sm bg-gray-100 px-3 py-1 rounded-full border border-gray-300">连接钱包</button>
    </header>

    <main class="p-4 space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="font-bold text-gray-800 text-md mb-4">小鹏 2026年Q2交付量突破 50,000 辆？</h2>
            <div class="flex space-x-3">
                <button onclick="openDrawer('Yes', 65)" class="flex-1 dark-btn py-3 rounded-xl font-bold">Yes (65%)</button>
                <button onclick="openDrawer('No', 35)" class="flex-1 gray-btn py-3 rounded-xl font-bold">No (35%)</button>
            </div>
        </div>
    </main>

    <div id="overlay" class="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="drawer" class="drawer">
        <div class="flex justify-between items-center mb-6">
            <h3 id="drawer-title" class="text-lg font-bold">下注</h3>
            <button onclick="closeDrawer()" class="text-gray-400 text-2xl">&times;</button>
        </div>
        
        <input type="number" id="amount" placeholder="0.00" oninput="updateProfit()" class="w-full text-3xl font-bold border-b-2 border-gray-200 focus:border-gray-800 outline-none py-2 mb-4">
        
        <div class="grid grid-cols-4 gap-2 mb-6">
            <button onclick="setAmount(10)" class="bg-gray-100 py-2 rounded-lg text-sm text-gray-600">10</button>
            <button onclick="setAmount(50)" class="bg-gray-100 py-2 rounded-lg text-sm text-gray-600">50</button>
            <button onclick="setAmount(100)" class="bg-gray-100 py-2 rounded-lg text-sm text-gray-600">100</button>
            <button onclick="setAmount(200)" class="bg-gray-100 py-2 rounded-lg text-sm text-gray-600">全部</button>
        </div>

        <button id="pay-button" onclick="handlePay()" class="w-full dark-btn py-4 rounded-2xl font-bold text-lg">确认下注</button>
    </div>

    <script>
        let isConnected = false;
        let currentProb = 0;
        let connector;

        // 初始化 TonConnect
        function initApp() {
            connector = new TonConnectSDK.TonConnect({
                manifestUrl: 'https://mayaoji.github.io/tonconnect-manifest.json'
            });

            // 监听连接状态变化
            connector.onStatusChange(wallet => {
                if (wallet) {
                    updateUIConnected(wallet.account.address);
                } else {
                    updateUIDisconnected();
                }
            });

            // 自动重连
            connector.restoreConnection();
        }

        async function handleConnect() {
            if (!isConnected) {
                // 如果是移动端，这会唤起选择钱包的界面
                const walletConnectionSource = {
                    universalLink: 'https://app.okx.com/ton-connect', // 优先唤起 OKX
                    bridgeUrl: 'https://bridge.tonapi.io/bridge'
                };
                const url = connector.connect(walletConnectionSource);
                window.location.href = url; // 唤起钱包
            } else {
                await connector.disconnect();
                updateUIDisconnected();
            }
        }

        function updateUIConnected(address) {
            const shortAddr = address.substring(0, 4) + '...' + address.substring(address.length - 4);
            const btn = document.getElementById('connect-btn');
            btn.innerText = shortAddr;
            btn.classList.replace('bg-gray-100', 'bg-blue-50');
            btn.classList.add('text-blue-600', 'border-blue-200');
            isConnected = true;
        }

        function updateUIDisconnected() {
            const btn = document.getElementById('connect-btn');
            btn.innerText = "连接钱包";
            btn.className = "text-sm bg-gray-100 px-3 py-1 rounded-full border border-gray-300";
            isConnected = false;
        }

        async function handlePay() {
            if (!isConnected) {
                alert("请先点击顶部连接钱包");
                return;
            }

            const amount = document.getElementById('amount').value;
            if (!amount || amount <= 0) { alert("请输入金额"); return; }

            const nanoAmount = Math.floor(amount * 1000000000).toString();
            
            // 构造正式的交易请求
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 60, // 60秒有效
                messages: [
                    {
                        address: "UQCbO0NSAoAbfPyh1tPUZP-Npt66hqLQUiCunSWnfcEMAz2y", // 你的收款地址
                        amount: nanoAmount,
                    }
                ]
            };

            try {
                // 核心：这是最稳定的唤起密码支付界面的方法
                await connector.sendTransaction(transaction);
                alert("交易已发送，请在钱包查看结果");
            } catch (e) {
                console.error(e);
                alert("支付被取消或出错");
            }
        }

        function openDrawer(type, prob) {
            currentProb = prob;
            document.getElementById('drawer-title').innerText = `下注: ${type} (${prob}%)`;
            document.getElementById('overlay').style.display = 'block';
            setTimeout(() => document.getElementById('drawer').classList.add('active'), 10);
        }

        function closeDrawer() {
            document.getElementById('drawer').classList.remove('active');
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 300);
        }

        function setAmount(val) { document.getElementById('amount').value = val; updateProfit(); }
        function updateProfit() {
            let amt = document.getElementById('amount').value;
            let potential = amt > 0 ? (amt * (100 / currentProb)).toFixed(2) : "0.00";
            document.getElementById('profit').innerText = `${potential} TON`;
        }
    </script>
</body>
</html>
