<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国预测市场</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.0/dist/tonconnect-ui.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(to bottom, #0088cc, #005f99);
            color: white;
            text-align: center;
        }
        h1 { font-size: 28px; margin: 20px 0; }
        button {
            padding: 16px 28px;
            margin: 10px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            border: none;
        }
        .yes-btn { background: #4CAF50; color: white; }
        .no-btn { background: #f44336; color: white; }
        .market { background: rgba(255,255,255,0.25); margin: 15px 0; padding: 20px; border-radius: 16px; text-align: left; }
        #connectBtn { background: #1a73e8; color: white; padding: 12px 24px; border-radius: 12px; }
    </style>
</head>
<body>
    <h1>🚀 中国预测市场</h1>
    <p>欢迎，<span id="user">朋友</span>！</p >
    
    <button id="connectBtn">🔗 连接 TON 钱包</button>
    <button onclick="createMarket()">📝 发布新预测</button>
    <button onclick="viewMarkets()">📋 查看所有预测</button>

    <div id="result" style="margin-top:30px;"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user || {};
        document.getElementById("user").textContent = user.first_name || "朋友";

        // TonConnect 初始化
        let tonConnectUI;
        async function initTonConnect() {
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://mayaoji.github.io/prediction-app/tonconnect-manifest.json', // 后面我们会创建这个文件
                buttonRootId: 'connectBtn'
            });
            
            tonConnectUI.onStatusChange(wallet => {
                if (wallet) {
                    tg.showAlert("✅ 钱包已连接！地址：" + wallet.account.address.slice(0,10) + "...");
                }
            });
        }
        initTonConnect();

        let markets = JSON.parse(localStorage.getItem('markets') || '[]');

        function createMarket() {
            const title = prompt("请输入预测标题：\n例如：Sora 本月会向中国用户开放吗？");
            if (!title || title.trim() === "") return tg.showAlert("标题不能为空！");
            
            markets.push({
                id: Date.now(),
                title: title.trim(),
                creator: user.first_name || "匿名",
                time: new Date().toLocaleString('zh-CN'),
                yes: 0,
                no: 0
            });
            localStorage.setItem('markets', JSON.stringify(markets));
            tg.showAlert("✅ 发布成功！");
            viewMarkets();
        }

        function viewMarkets() {
            let html = "<h2>当前活跃预测：</h2>";
            if (markets.length === 0) {
                html += "<p>还没有预测，快去发布吧！</p >";
            } else {
                markets.forEach(m => {
                    const total = (m.yes || 0) + (m.no || 0) || 1;
                    const yesP = Math.round(((m.yes || 0) / total) * 100);
                    const noP = Math.round(((m.no || 0) / total) * 100);

                    html += `
                        <div class="market">
                            <b>${m.title}</b><br>
                            <small>发布者：${m.creator} | ${m.time}</small><br><br>
                            <button class="yes-btn" onclick="buyYes(\( {m.id})">买入 Yes ( \){yesP}%)</button>
                            <span style="margin-left:15px">${m.yes || 0} 份额</span><br><br>
                            <button class="no-btn" onclick="buyNo(\( {m.id})">买入 No ( \){noP}%)</button>
                            <span style="margin-left:15px">${m.no || 0} 份额</span>
                        </div>`;
                });
            }
            document.getElementById("result").innerHTML = html;
        }

        async function buyYes(id) {
            if (!tonConnectUI || !tonConnectUI.connected) {
                return tg.showAlert("请先点击上方按钮连接 TON 钱包！");
            }
            const amount = prompt("请输入买入 Yes 的份额数量（每个份额模拟 0.1 TON）：", "10");
            if (!amount || isNaN(amount) || amount <= 0) return;

            const value = parseFloat(amount) * 0.1; // 每份 0.1 TON
            tg.showAlert(`正在发起支付 ${value} TON 到预测池...（演示）`);
            
            // 这里后面会替换成真实交易发送
            // 目前先模拟
            const m = markets.find(item => item.id === id);
            if (m) {
                m.yes = (m.yes || 0) + parseInt(amount);
                localStorage.setItem('markets', JSON.stringify(markets));
                tg.showAlert(`✅ 已模拟买入 ${amount} Yes 份额！`);
                viewMarkets();
            }
        }

        async function buyNo(id) {
            if (!tonConnectUI || !tonConnectUI.connected) {
                return tg.showAlert("请先连接 TON 钱包！");
            }
            const amount = prompt("请输入买入 No 的份额数量（每个份额模拟 0.1 TON）：", "10");
            if (!amount || isNaN(amount) || amount <= 0) return;

            tg.showAlert(`正在发起支付 ${parseFloat(amount)*0.1} TON...`);
            const m = markets.find(item => item.id === id);
            if (m) {
                m.no = (m.no || 0) + parseInt(amount);
                localStorage.setItem('markets', JSON.stringify(markets));
                tg.showAlert(`✅ 已模拟买入 ${amount} No 份额！`);
                viewMarkets();
            }
        }

        window.onload = viewMarkets;
    </script>
</body>
</html>
