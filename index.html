<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场 | 支付中心</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode_js@1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #26a17b;
            --bg: #0b1118;
            --card-bg: #161f28;
            --text-main: #ffffff;
            --text-dim: #7f8c9d;
            --font-round: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); font-family: var(--font-round); margin: 0; padding: 0; }

        /* 主界面样式 */
        .app-container { padding: 16px; max-width: 500px; margin: 0 auto; padding-bottom: 120px; }
        .brand { font-size: 20px; font-weight: 700; margin: 10px 0 20px; text-align: center; }
        .brand span { color: var(--primary); }

        .market-card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .market-topic { font-size: 17px; font-weight: 700; margin-bottom: 12px; }
        .bet-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 14px; font-weight: 700; margin-top: 10px; }

        /* === 方案 B：收银台弹窗样式 === */
        #checkout-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: flex-end; z-index: 2000;
        }
        .checkout-content {
            background: #ffffff; color: #333; width: 100%; max-width: 500px;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 24px; position: relative; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .checkout-header { text-align: center; margin-bottom: 20px; }
        .checkout-title { font-size: 18px; font-weight: 800; color: #111; }
        .timer { color: #ff4d4f; font-weight: 700; background: #fff1f0; padding: 4px 12px; border-radius: 20px; font-size: 14px; }

        .amount-section { text-align: center; margin: 20px 0; }
        .amount-value { font-size: 36px; font-weight: 800; color: #111; }
        .amount-unit { font-size: 16px; margin-left: 4px; }

        .address-box {
            background: #f5f7f9; border-radius: 16px; padding: 16px;
            margin-bottom: 20px; border: 1px dashed #cbd5e0;
        }
        .address-text { font-family: monospace; font-size: 13px; word-break: break-all; color: #4a5568; }

        .qr-container { display: flex; justify-content: center; margin-bottom: 20px; }
        #qrcode img { border: 10px solid #fff; border-radius: 10px; }

        .action-btns { display: flex; flex-direction: column; gap: 12px; }
        .btn-okx { background: #000; color: #fff; border: none; padding: 16px; border-radius: 16px; font-weight: 700; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-copy { background: #edf2f7; color: #2d3748; border: none; padding: 16px; border-radius: 16px; font-weight: 700; }
        .btn-cancel { color: #a0aec0; border: none; background: none; padding: 10px; font-size: 14px; }

    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand">🚀 中国<span>预测市场</span></div>
        <div id="market-list"></div>
    </div>

    <div id="checkout-modal">
        <div class="checkout-content">
            <div class="checkout-header">
                <div class="checkout-title">数字货币支付</div>
                <span class="timer" id="countdown">14:59</span>
            </div>

            <div class="amount-section">
                <div style="font-size: 14px; color: #718096;">请支付精确金额</div>
                <div class="amount-value" id="pay-amount">0.11<span class="amount-unit">USDT</span></div>
                <div style="font-size: 12px; color: var(--primary);">TRC20-USDT</div>
            </div>

            <div class="qr-container" id="qrcode"></div>

            <div class="address-box">
                <div style="font-size: 12px; color: #a0aec0; margin-bottom: 6px;">收款地址 (TRC20)</div>
                <div class="address-text" id="target-address">TY6nQp8SYZUAB6FTuDxqnB2FU87ukAa...</div>
            </div>

            <div class="action-btns">
                <button class="btn-okx" onclick="invokeOKX()">
                    ⚡ 打开 OKX 支付
                </button>
                <button class="btn-copy" onclick="copyAddress()">复制收款地址</button>
                <button class="btn-cancel" onclick="closeCheckout()">取消订单</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://kfalyawduveuuttniiun.supabase.co";
        const SB_KEY = "sb_publishable_6mBG3xWhYAHCOEmNIG4BEA_wh5O2Ayx";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const tg = window.Telegram.WebApp;

        const RECEIVER_ADDR = "TY6nQp8SYZUAB6FTuDxqnB2FU87ukAa"; // 替换为你的真实地址

        async function loadMarkets() {
            const { data } = await supabaseClient.from('markets').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('market-list').innerHTML = data.map(item => `
                    <div class="market-card">
                        <div class="market-topic">📊 ${item.topic || '话题'}</div>
                        <div style="color: #7f8c9d; font-size: 13px;">奖池: ${item.pool} USDT</div>
                        <button class="bet-btn" onclick="openCheckout()">参与预测</button>
                    </div>
                `).join('');
            }
        }

        // 打开收银台
        function openCheckout() {
            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('checkout-modal').style.display = 'flex';
            document.getElementById('target-address').innerText = RECEIVER_ADDR;
            
            // 生成二维码
            const qrDiv = document.getElementById("qrcode");
            qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: RECEIVER_ADDR, width: 140, height: 140 });
            
            startTimer(900); // 15分钟倒计时
        }

        function closeCheckout() {
            document.getElementById('checkout-modal').style.display = 'none';
        }

        // 调用 OKX (Deep Link)
        function invokeOKX() {
            const amount = 0.11;
            // 构造 OKX 深度链接
            const okxUrl = `okx://main/wallet/transfer?dest=${RECEIVER_ADDR}&chain=tron&symbol=usdt&amount=${amount}`;
            
            tg.openLink(okxUrl, { try_instant_view: false });
            
            // 如果 openLink 没反应，可能是协议不支持，提示用户
            setTimeout(() => {
                tg.showAlert("如果未自动跳转，请确保手机已安装 OKX App，或使用下方复制地址功能。");
            }, 1000);
        }

        function copyAddress() {
            const el = document.createElement('textarea');
            el.value = RECEIVER_ADDR;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            tg.showAlert("地址已复制到剪贴板");
        }

        function startTimer(duration) {
            let timer = duration, minutes, seconds;
            const display = document.getElementById('countdown');
            const interval = setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);
                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;
                display.textContent = minutes + ":" + seconds;
                if (--timer < 0) clearInterval(interval);
            }, 1000);
        }

        window.onload = () => {
            tg.ready();
            loadMarkets();
        };
    </script>
</body>
</html>
