<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国预测市场 - 实时同步版</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #0a2540, #1e3a8a); color: white; text-align: center; min-height: 100vh; padding: 20px; }
        .market-card { background: rgba(255,255,255,0.1); margin: 15px auto; padding: 25px; border-radius: 16px; text-align: left; max-width: 600px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .btn-yes { background: #22c55e; border: none; color: white; padding: 12px; border-radius: 8px; width: 48%; cursor: pointer; font-weight: bold; }
        .btn-no { background: #ef4444; border: none; color: white; padding: 12px; border-radius: 8px; width: 48%; cursor: pointer; font-weight: bold; }
        #connect-btn-root { margin: 20px 0; display: flex; justify-content: center; }
        .btn-main { padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: bold; background: white; color: #0a2540; border: none; }
        #wallet-info { color: #90ee90; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <h1>🚀 中国预测市场</h1>
    <p style="opacity: 0.8;">基于 TON 区块链 · 全球实时同步 · 支付即发布</p >

    <div id="connect-btn-root"></div>
    <div id="wallet-info">等待连接钱包...</div>

    <div style="margin-bottom: 30px;">
        <button class="btn-main" onclick="createMarket()">📝 发起新预测</button>
        <button class="btn-main" style="margin-left:10px; background:rgba(255,255,255,0.2); color:white;" onclick="fetchMarkets()">🔄 刷新列表</button>
    </div>

    <div id="market-list">正在加载云端数据...</div>

    <script>
        // ======= 【已为你填好的配置信息】 =======
        const S_URL = "https://kfalyawduveuuttniun.supabase.co"; 
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYWx5YXdkdXZldXV0dG5paXVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODE2MjQsImV4cCI6MjA5MjQ1NzYyNH0.YdlWOljkvsimq628KSxw99bpvmyN8Bsdza15uFoEs_0"; 
        const MY_ADDR = "UQCbO0NSAoAbfPyh1tPUZP-Npt66hqLQUiCunSWnfcEMAz2y"; // 你的OKX接收地址
        // ======================================

        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://mayaoji.github.io/prediction-app/tonconnect-manifest.json',
            buttonRootId: 'connect-btn-root'
        });

        // 1. 获取云端列表
        async function fetchMarkets() {
            const { data, error } = await supabaseClient
                .from('markets')
                .select('*')
                .order('created_at', { ascending: false });
            
            const listDiv = document.getElementById('market-list');
            if (data && data.length > 0) {
                listDiv.innerHTML = data.map(m => `
                    <div class="market-card">
                        <div style="float:right; color:#facc15;">💰 奖池: ${m.pool} TON</div>
                        <h3 style="margin:0 0 15px 0;">${m.topic}</h3>
                        <div style="display:flex; justify-content:space-between;">
                            <button class="btn-yes" onclick="handleBet('${m.topic}')">押注 YES</button>
                            <button class="btn-no" onclick="handleBet('${m.topic}')">押注 NO</button>
                        </div>
                    </div>
                `).join('');
            } else {
                listDiv.innerHTML = "<p>云端暂无数据，快去发起一个吧！</p >";
            }
        }

        // 2. 发起预测话题 (支付逻辑修复版)
        async function createMarket() {
            if (!tonConnectUI.connected) return alert("请先连接钱包");
            
            const topic = prompt("请输入你想发起的预测话题：");
            const poolAmt = prompt("注入奖池金额 (TON):", "1");
            if (!topic || !poolAmt) return;

            // 计算总金额：(奖池 + 0.1服务费) 换算成 nanoTON
            const totalNano = Math.floor((parseFloat(poolAmt) + 0.1) * 1000000000);

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: MY_ADDR, 
                    amount: totalNano.toString() 
                }]
            };

            try {
                // 唤起支付
                await tonConnectUI.sendTransaction(transaction);
                alert("支付指令已发出！正在写入云端数据库...");

                // 支付成功后立即写入 Supabase
                const { error } = await supabaseClient
                    .from('markets')
                    .insert([{ topic: topic, pool: parseFloat(poolAmt) }]);
                
                if (!error) {
                    alert("🎉 发布成功！全网可见。");
                    fetchMarkets();
                } else {
                    console.error("写入失败:", error);
                    alert("数据库写入失败，请检查网络。");
                }
            } catch (e) {
                alert("交易失败或取消。请确保钱包内有足够的 TON 支付燃料费。");
            }
        }

        // 3. 押注逻辑
        async function handleBet(topic) {
            if (!tonConnectUI.connected) return alert("请先连接钱包");
            const amt = prompt(`押注 [${topic}] 的金额 (TON):`, "1");
            if (!amt) return;

            try {
                await tonConnectUI.sendTransaction({
                    validUntil: Math.floor(Date.now() / 1000) + 300,
                    messages: [{ address: MY_ADDR, amount: (parseFloat(amt)*1000000000).toString() }]
                });
                alert("押注已提交！");
            } catch (e) {
                alert("交易未完成");
            }
        }

        // 自动初始化
        fetchMarkets();
        tonConnectUI.onStatusChange(w => {
            const info = document.getElementById('wallet-info');
            if (w) {
                const addr = w.account.address;
                info.innerText = "已连接: " + addr.substring(0,4) + "..." + addr.substring(addr.length-4);
            } else {
                info.innerText = "钱包未连接";
            }
        });
    </script>
</body>
</html>
