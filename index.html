<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国预测市场</title>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #0a2540, #1e3a8a);
            color: white;
            text-align: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            font-size: 48px;
            margin: 40px 0 10px;
        }
        .subtitle {
            font-size: 24px;
            opacity: 0.9;
            margin-bottom: 50px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin: 40px 0;
        }
        button {
            padding: 18px 32px;
            font-size: 19px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            min-width: 180px;
            cursor: pointer;
        }
        .btn-connect { background: #3b82f6; color: white; }
        .btn-secondary { background: rgba(255,255,255,0.95); color: #1e3a8a; }
        #wallet-info { 
            font-size: 20px; 
            margin: 30px 0; 
            min-height: 30px; 
            color: #90ee90;
        }
        .market-card {
            background: rgba(255,255,255,0.12);
            margin: 25px auto;
            padding: 30px;
            border-radius: 20px;
            max-width: 800px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🚀 中国预测市场</h1>
    <p class="subtitle">预测未来，一起下注 · 真实事件 · 实时赔率</p >

    <div id="wallet-info">未连接钱包</div>

    <div class="btn-group">
        <button class="btn-connect" onclick="connectWallet()">🔗 连接 TON 钱包</button>
        <button class="btn-secondary" onclick="createMarket()">📝 发布新预测</button>
        <button class="btn-secondary" onclick="viewMarkets()">📋 浏览所有预测</button>
    </div>

    <div id="result" style="margin-top: 40px;"></div>

    <script>
        let markets = [];
        let walletConnected = false;

        function connectWallet() {
            walletConnected = true;
            document.getElementById('wallet-info').innerHTML = '✅ TON 钱包已连接！';
            alert('✅ TON 钱包连接成功！\n现在可以发布预测和买入份额了。');
        }

        function createMarket() {
            if (!walletConnected) return alert("请先点击上方“连接 TON 钱包”！");
            const title = prompt("请输入预测标题：");
            if (!title) return;
            markets.push({ id: Date.now(), title: title, yes: 0, no: 0 });
            alert("✅ 发布成功！");
            viewMarkets();
        }

        function viewMarkets() {
            let html = "<h2 style='text-align:center; margin:40px 0 20px;'>当前活跃预测</h2>";
            if (markets.length === 0) {
                html += "<p style='text-align:center; font-size:18px;'>还没有预测，快来发布第一个吧！</p >";
            } else {
                markets.forEach(m => {
                    html += `
                        <div class="market-card">
                            <h3>${m.title}</h3><br>
                            <button onclick="buyYes(${m.id})" style="background:#22c55e;color:white;padding:14px 28px;border-radius:12px;margin:8px;">Yes</button> 
                            <span style="font-size:18px;">${m.yes} 份额</span><br><br>
                            <button onclick="buyNo(${m.id})" style="background:#ef4444;color:white;padding:14px 28px;border-radius:12px;margin:8px;">No</button> 
                            <span style="font-size:18px;">${m.no} 份额</span>
                        </div>`;
                });
            }
            document.getElementById("result").innerHTML = html;
        }

        function buyYes(id) {
            if (!walletConnected) return alert("请先连接 TON 钱包！");
            const amount = prompt("买入 Yes 数量：", "10");
            if (!amount || parseInt(amount) <= 0) return;
            markets.forEach(m => { if (m.id === id) m.yes += parseInt(amount); });
            alert("✅ 买入 Yes 成功！");
            viewMarkets();
        }

        function buyNo(id) {
            if (!walletConnected) return alert("请先连接 TON 钱包！");
            const amount = prompt("买入 No 数量：", "10");
            if (!amount || parseInt(amount) <= 0) return;
            markets.forEach(m => { if (m.id === id) m.no += parseInt(amount); });
            alert("✅ 买入 No 成功！");
            viewMarkets();
        }

        window.onload = viewMarkets;
    </script>
</body>
</html>
