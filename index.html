<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国预测市场 - 预测未来，一起下注</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(to bottom, #0a2540, #1e3a8a);
            color: white;
            text-align: center;
            line-height: 1.6;
        }
        header { padding: 40px 20px; }
        h1 { font-size: 48px; margin: 0 0 10px 0; }
        .subtitle { font-size: 24px; opacity: 0.9; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        button {
            padding: 16px 32px;
            margin: 15px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-secondary { background: white; color: #1e40af; }
        #wallet-info { margin: 20px 0; font-size: 18px; color: #90ee90; }
        .market-card {
            background: rgba(255,255,255,0.1);
            margin: 20px auto;
            padding: 25px;
            border-radius: 16px;
            max-width: 800px;
            text-align: left;
        }
    </style>
</head>
<body>
    <header>
        <h1>🚀 中国预测市场</h1>
        <p class="subtitle">预测未来，一起下注 · 真实事件 · 实时赔率</p >
    </header>

    <div class="container">
        <div id="wallet-info">未连接钱包</div>
        <button id="connect-btn" class="btn-primary">🔗 连接 TON 钱包</button>
        <button class="btn-secondary" onclick="createMarket()">📝 发布新预测</button>
        <button class="btn-secondary" onclick="viewMarkets()">📋 浏览所有预测</button>

        <div id="result" style="margin-top: 50px;"></div>
    </div>

    <script>
        let markets = [];
        let tonConnectUI = null;
        let connectedWallet = null;

        async function initTonConnect() {
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://symphonious-granita-a4d445.netlify.app/tonconnect-manifest.json',
                buttonRootId: 'connect-btn'
            });

            tonConnectUI.onStatusChange(wallet => {
                if (wallet) {
                    connectedWallet = wallet;
                    const address = wallet.account.address;
                    document.getElementById('wallet-info').innerHTML = 
                        `✅ 已连接 TON 钱包<br><small>\( {address.slice(0,6)}... \){address.slice(-4)}</small>`;
                } else {
                    connectedWallet = null;
                    document.getElementById('wallet-info').innerHTML = '未连接钱包';
                }
            });
        }

        function createMarket() {
            if (!connectedWallet) return alert("请先连接 TON 钱包！");
            const title = prompt("请输入预测标题：");
            if (!title) return;
            markets.push({ id: Date.now(), title: title, yes: 0, no: 0 });
            alert("✅ 发布成功！");
            viewMarkets();
        }

        function viewMarkets() {
            let html = "<h2 style='text-align:center;'>当前活跃预测</h2>";
            if (markets.length === 0) {
                html += "<p style='text-align:center;'>还没有预测，快来发布第一个吧！</p >";
            } else {
                markets.forEach(m => {
                    html += `
                        <div class="market-card">
                            <h3>${m.title}</h3>
                            <button onclick="buyYes(${m.id})" style="background:#22c55e;color:white;padding:12px 24px;border-radius:8px;margin:5px;">Yes</button> 
                            <span>${m.yes} 份额</span><br><br>
                            <button onclick="buyNo(${m.id})" style="background:#ef4444;color:white;padding:12px 24px;border-radius:8px;margin:5px;">No</button> 
                            <span>${m.no} 份额</span>
                        </div>`;
                });
            }
            document.getElementById("result").innerHTML = html;
        }

        function buyYes(id) {
            if (!connectedWallet) return alert("请先连接 TON 钱包！");
            const amount = prompt("买入 Yes 数量：", "10");
            if (!amount || parseInt(amount) <= 0) return;
            markets.forEach(m => { if (m.id === id) m.yes += parseInt(amount); });
            alert("✅ 买入 Yes 成功！");
            viewMarkets();
        }

        function buyNo(id) {
            if (!connectedWallet) return alert("请先连接 TON 钱包！");
            const amount = prompt("买入 No 数量：", "10");
            if (!amount || parseInt(amount) <= 0) return;
            markets.forEach(m => { if (m.id === id) m.no += parseInt(amount); });
            alert("✅ 买入 No 成功！");
            viewMarkets();
        }

        window.onload = () => {
            initTonConnect();
            viewMarkets();
        };
    </script>
</body>
</html>
