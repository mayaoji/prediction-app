<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预测市场 - 破壁打通版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#0e1621; color:white; text-align:center; padding:30px; font-family:sans-serif;">
    <h2>🚀 预测市场 (数据直连版)</h2>
    <div id="status" style="color:#81b3d2; margin-bottom:20px;">正在强力破障连接...</div>
    <div id="list"></div>

    <script>
        // 核心逻辑：如果直接连被拦截，这个脚本会尝试用更通用的方式去“敲门”
        const SB_URL = 'https://kfalyawduveuuttniun.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYWx5YXdkdXZldXV0dG5paXVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODE2MjQsImV4cCI6MjA5MjQ1NzYyNH0.YdlWOljkvsimq628KSxw99bpvmyN8Bsdza15uFoEs_0';

        async function connect() {
            const status = document.getElementById('status');
            const list = document.getElementById('list');

            try {
                // 使用最基础的 fetch 模式，这比 SDK 更不容易触发浏览器的安全拦截
                const response = await fetch(`${SB_URL}/rest/v1/markets?select=*`, {
                    headers: {
                        'apikey': SB_KEY,
                        'Authorization': `Bearer ${SB_KEY}`
                    }
                });

                if (!response.ok) throw new Error('服务器握手失败');

                const data = await response.json();
                
                if (data && data.length > 0) {
                    status.innerText = "✅ 数据共享已打通！";
                    list.innerHTML = data.map(m => `
                        <div style="background:#17212b; padding:15px; border-radius:10px; margin-bottom:10px; border-left:4px solid #248bcf; text-align:left;">
                            <strong>${m.topic}</strong><br>
                            <small style="color:#81b3d2;">💰 奖池: ${m.pool} TON</small>
                        </div>
                    `).join('');
                } else {
                    status.innerText = "✅ 连上了，但表里没数据";
                }
            } catch (err) {
                status.innerHTML = `<b style="color:red;">❌ 依然报错: ${err.message}</b><br><br>这是浏览器安全锁死，我们最后一招：<br>请尝试换个浏览器（比如 Chrome 或 Edge）打开试试。`;
            }
        }

        connect();
    </script>
</body>
</html>
