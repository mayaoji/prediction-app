<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国预测市场</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(to bottom, #0088cc, #005f99);
            color: white;
            text-align: center;
        }
        h1 { font-size: 32px; margin: 30px 0 20px; }
        button {
            display: block;
            width: 90%;
            max-width: 340px;
            margin: 15px auto;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
        }
        .connect { background: #1a73e8; color: white; }
        .publish { background: #ffffff; color: #0088cc; }
        .view { background: #ffffff; color: #0088cc; }
    </style>
</head>
<body>
    <h1>🚀 中国预测市场</h1>
    <p>欢迎，朋友！</p >

    <button class="connect" onclick="alert('TON 钱包连接功能开发中...')">🔗 连接 TON 钱包</button>
    <button class="publish" onclick="createMarket()">📝 发布新预测</button>
    <button class="view" onclick="viewMarkets()">📋 查看所有预测</button>

    <div id="result" style="margin-top:40px; text-align:left;"></div>

    <script>
        let markets = [];

        function createMarket() {
            const title = prompt("请输入预测标题：");
            if (!title) return;
            markets.push({
                id: Date.now(),
                title: title,
                yes: 0,
                no: 0
            });
            alert("✅ 发布成功！");
            viewMarkets();
        }

        function viewMarkets() {
            let html = "<h2>当前活跃预测：</h2>";
            if (markets.length === 0) {
                html += "<p>还没有预测</p >";
            } else {
                for (var i = 0; i < markets.length; i++) {
                    var m = markets[i];
                    html += '<div style="background:rgba(255,255,255,0.2);margin:15px 0;padding:20px;border-radius:16px;">';
                    html += '<b>' + m.title + '</b><br><br>';
                    html += '<button onclick="buyYes(' + m.id + ')">Yes</button> ' + (m.yes || 0) + ' 份额<br><br>';
                    html += '<button onclick="buyNo(' + m.id + ')">No</button> ' + (m.no || 0) + ' 份额';
                    html += '</div>';
                }
            }
            document.getElementById("result").innerHTML = html;
        }

        function buyYes(id) {
            const amount = prompt("买入 Yes 数量：", "10");
            if (!amount || parseInt(amount) <= 0) return;
            for (var i = 0; i < markets.length; i++) {
                if (markets[i].id === id) {
                    markets[i].yes = (markets[i].yes || 0) + parseInt(amount);
                    break;
                }
            }
            alert("✅ 买入 Yes 成功！");
            viewMarkets();
        }

        function buyNo(id) {
            const amount = prompt("买入 No 数量：", "10");
            if (!amount || parseInt(amount) <= 0) return;
            for (var i = 0; i < markets.length; i++) {
                if (markets[i].id === id) {
                    markets[i].no = (markets[i].no || 0) + parseInt(amount);
                    break;
                }
            }
            alert("✅ 买入 No 成功！");
            viewMarkets();
        }

        window.onload = viewMarkets;
    </script>
</body>
</html>
