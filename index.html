<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国预测市场</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg-dark: #000000; /* 纯黑底色 */
            --card-bg: #111111; /* 深灰色卡片 */
            --btn-gray: #e0e0e0; /* 按钮浅灰色 */
            --gold: #d4af37;    /* 商务金点缀 */
            --text-white: #ffffff;
            --text-dim: #888888;
        }

        body { 
            background: var(--bg-dark); color: var(--text-white); 
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
        }

        .app-container { width: 100%; max-width: 500px; padding: 20px; padding-bottom: 120px; }

        /* 标题统一颜色，移除图标 */
        .header { display: flex; justify-content: center; align-items: center; margin: 30px 0; }
        .brand { font-size: 22px; font-weight: 800; color: var(--gold); letter-spacing: 2px; }

        /* 连接钱包引导卡片 */
        .wallet-card {
            background: var(--card-bg); border-radius: 20px; padding: 25px;
            margin-bottom: 24px; text-align: center;
            border: 1px solid #222;
        }
        .wallet-title { font-size: 14px; color: var(--text-dim); margin-bottom: 15px; }
        #ton-connect-btn { display: flex; justify-content: center; }

        .section-title { font-size: 14px; font-weight: 600; color: var(--gold); margin-bottom: 15px; text-transform: uppercase; }

        /* 项目列表 */
        .market-item {
            background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px;
            border: 1px solid #222;
        }
        .market-topic { font-size: 18px; font-weight: 700; margin-bottom: 15px; color: var(--text-white); }
        
        /* Yes/No 百分比条 */
        .vote-stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .vote-bar { 
            flex: 1; background: #222; height: 40px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; position: relative; overflow: hidden;
        }
        .vote-fill { position: absolute; left: 0; top: 0; height: 100%; transition: width 0.3s; opacity: 0.3; }
        .yes-fill { background: #00ff00; }
        .no-fill { background: #ff0000; }
        .vote-label { z-index: 2; }
        .vote-label.yes { color: #00ff00; }
        .vote-label.no { color: #ff4d4d; }

        /* 参与按钮改为浅灰色 */
        .btn-join {
            width: 100%; background: var(--btn-gray); color: #000; border: none;
            padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700;
        }

        /* 底部发起预测按钮 */
        .fixed-footer {
            position: fixed; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000;
        }
        .btn-create {
            width: 90%; max-width: 450px; background: var(--btn-gray); color: #000; border: none;
            padding: 18px; border-radius: 18px; font-size: 16px; font-weight: 800;
            box-shadow: 0 4px 20px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="brand">中国预测市场</div>
        </div>

        <div class="wallet-card">
            <div class="wallet-title">请连接 TON 钱包参与预测</div>
            <div id="ton-connect-btn"></div>
        </div>

        <div class="section-title">实时预测榜单</div>
        <div id="market-list"></div>
    </div>

    <div class="fixed-footer">
        <button id="main-create-btn" class="btn-create">发起新预测 (0.1 TON)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://mayaoji.github.io/prediction-app/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        const SB_URL = "https://kfalyawduveuuttniiun.supabase.co";
        const SB_KEY = "sb_publishable_6mBG3xWhYAHCOEmNIG4BEA_wh5O2Ayx";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function loadMarkets() {
            const { data } = await supabaseClient.from('markets').select('*').order('created_at', { ascending: false });
            const listDiv = document.getElementById('market-list');
            
            if (data) {
                listDiv.innerHTML = data.map(item => {
                    const yesPercent = item.yes_percent || 50;
                    const noPercent = 100 - yesPercent;
                    
                    return `
                    <div class="market-item">
                        <div class="market-topic">${item.topic}</div>
                        <div class="vote-stats">
                            <div class="vote-bar">
                                <div class="vote-fill yes-fill" style="width: ${yesPercent}%"></div>
                                <span class="vote-label yes">Yes ${yesPercent}%</span>
                            </div>
                            <div class="vote-bar">
                                <div class="vote-fill no-fill" style="width: ${noPercent}%"></div>
                                <span class="vote-label no">No ${noPercent}%</span>
                            </div>
                        </div>
                        <button class="btn-join" onclick="handleBet('${item.id}')">立即参与</button>
                    </div>
                    `;
                }).join('');
            }
        }

        // 按钮交互修复
        document.getElementById('main-create-btn').addEventListener('click', () => {
            tg.HapticFeedback.impactOccurred('medium');
            if (!tonConnectUI.connected) {
                tg.showAlert("请先连接钱包");
            } else {
                tg.showAlert("功能对接中，请稍候...");
            }
        });

        async function handleBet(marketId) {
            tg.HapticFeedback.selectionChanged();
            if (!tonConnectUI.connected) {
                tonConnectUI.openModal();
            } else {
                tg.showAlert("正在唤起 TON 支付...");
            }
        }

        window.onload = () => {
            tg.ready();
            tg.expand();
            loadMarkets();
        };
    </script>
</body>
</html>
