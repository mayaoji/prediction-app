<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国预测市场</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {font-family:Arial,sans-serif;margin:0;padding:20px;background:linear-gradient(#0088cc,#005f99);color:white;text-align:center;}
        h1 {margin:20px 0;}
        button {padding:14px 24px;margin:8px;border-radius:12px;font-size:17px;font-weight:bold;border:none;width:160px;}
        .connect-btn {background:#1a73e8;color:white;width:90%;max-width:320px;}
        .yes-btn {background:#4CAF50;color:white;}
        .no-btn {background:#f44336;color:white;}
        .market {background:rgba(255,255,255,0.25);margin:15px 0;padding:18px;border-radius:12px;text-align:left;}
    </style>
</head>
<body>
    <h1>🚀 中国预测市场</h1>
    <p>欢迎，<span id="user">朋友</span>！</p >

    <button onclick="connectWallet()" class="connect-btn">🔗 连接 TON 钱包</button>
    <button onclick="createMarket()">📝 发布新预测</button>
    <button onclick="viewMarkets()">📋 查看所有预测</button>

    <div id="result" style="margin-top:30px;"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : {};
        document.getElementById("user").textContent = user.first_name || "朋友";

        let markets = JSON.parse(localStorage.getItem("markets") || "[]");
        let walletConnected = false;

        function connectWallet() {
            walletConnected = true;
            tg.showAlert("✅ TON 钱包连接成功！\n\n现在可以正常买入份额了。\n（真实支付正在开发中）");
        }

        function createMarket() {
            const title = prompt("请输入预测标题：\n例如：Sora 本月会向中国用户开放吗？");
            if (!title || title.trim() === "") {
                tg.showAlert("标题不能为空！");
                return;
            }
            markets.push({
                id: Date.now(),
                title: title.trim(),
                creator: user.first_name || "匿名",
                time: new Date().toLocaleString("zh-CN"),
                yes: 0,
                no: 0
