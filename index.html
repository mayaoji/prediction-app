<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase 测试</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#0e1621; color:white; padding:40px; font-family:sans-serif; text-align:center; line-height:1.8; }
        #result { background:#17212b; padding:30px; border-radius:12px; margin:30px auto; max-width:600px; word-break:break-all; }
    </style>
</head>
<body>
    <h1>🔍 Supabase 数据共享测试</h1>
    <div id="result">正在测试连接...</div>

    <script>
        const supabase = supabase.createClient(
            'https://kfalyawduveuuttniun.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYWx5YXdkdXZldXV0dG5paXVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODE2MjQsImV4cCI6MjA5MjQ1NzYyNH0.YdlWOljkvsimq628KSxw99bpvmyN8Bsdza15uFoEs_0'
        );

        async function test() {
            const resultDiv = document.getElementById('result');
            try {
                resultDiv.innerHTML = "正在查询数据...";
                
                const { data, error } = await supabase
                    .from('markets')
                    .select('*')
                    .order('id', { ascending: false })
                    .limit(10);

                if (error) throw error;

                if (data && data.length > 0) {
                    resultDiv.innerHTML = `✅ <strong>连接成功！</strong><br>共找到 ${data.length} 条预测<br><br>` 
                        + data.map(m => `• ${m.topic} (奖池 ${m.pool} USDT)`).join('<br>');
                } else {
                    resultDiv.innerHTML = `✅ 连接成功！<br>目前还没有预测数据`;
                }
            } catch (err) {
                resultDiv.innerHTML = `❌ 连接失败<br><br>${err.message || err}<br><br>请把这个错误截图发给我`;
            }
        }

        window.onload = test;
    </script>
</body>
</html>
